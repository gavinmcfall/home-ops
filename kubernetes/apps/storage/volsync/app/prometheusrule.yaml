---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync-rules
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolSyncComponentAbsent
          annotations:
            summary: VolSync component has disappeared from Prometheus target discovery.
          expr: |
            absent(up{job="volsync-metrics"})
          for: 15m
          labels:
            severity: critical
        - alert: VolSyncVolumeOutOfSync
          annotations:
            summary: >-
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} volume
              is out of sync.
          # 1h tolerates one missed hourly cycle; most "out of sync" events
          # self-resolve at the next scheduled run. 15m was too tight and
          # paged on normal transient hiccups (verified 2026-05-19).
          expr: |
            volsync_volume_out_of_sync == 1
          for: 1h
          labels:
            severity: critical
