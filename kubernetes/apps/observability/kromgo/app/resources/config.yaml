---
# yaml-language-server: $schema=https://raw.githubusercontent.com/kashalls/kromgo/main/config.schema.json
metrics:
  - name: talos_version
    query: node_os_info{name="Talos"}
    label: version_id

  - name: kubernetes_version
    query: kubernetes_build_info{service="kubernetes"}
    label: git_version

  - name: cluster_node_count
    query: count(count by (node) (kube_node_status_condition{condition="Ready"}))
    colors:
      - { color: "green", min: 0, max: 9999 }

  - name: cluster_pod_count
    query: sum(kube_pod_status_phase{phase="Running"})
    colors:
      - { color: "green", min: 0, max: 9999 }

  - name: cluster_cpu_usage
    query: round(avg(instance:node_cpu_utilisation:rate5m) * 100, 0.1)
    suffix: "%"
    colors:
      - { color: "green", min: 0, max: 35 }
      - { color: "orange", min: 36, max: 75 }
      - { color: "red", min: 76, max: 9999 }

  - name: cluster_memory_usage
    query: round(sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes) * 100, 0.1)
    suffix: "%"
    colors:
      - { color: green, min: 0, max: 35 }
      - { color: orange, min: 36, max: 75 }
      - { color: red, min: 76, max: 9999 }

  - name: cluster_power_usage
    query: sum(network_ups_tools_ups_realpower)
    suffix: "w"
    colors:
      - { color: "green", min: 0, max: 300 }
      - { color: "orange", min: 301, max: 480 }
      - { color: "red", min: 481, max: 9999 }

  - name: cluster_age_days
    query: round((time() - min(kube_node_created) ) / 86400)
    suffix: "d"
    colors:
      - { color: "green", min: 0, max: 180 }
      - { color: "orange", min: 181, max: 360 }
      - { color: "red", min: 361, max: 9999 }

  - name: cluster_uptime_days
    query: round(avg(node_time_seconds - node_boot_time_seconds) / 86400)
    suffix: "d"
    colors:
      - { color: "green", min: 0, max: 180 }
      - { color: "orange", min: 181, max: 360 }
      - { color: "red", min: 361, max: 9999 }

  - name: flux_version
    query: label_replace(flux_instance_info, "revision", "$1", "revision", "v(.+)@sha256:(.+)")
    label: revision

  - name: cluster_alert_count
    # Only count critical and warning alerts; excludes info, none (Watchdog, InfoInhibitor)
    query: count(ALERTS{alertstate="firing", severity=~"critical|warning"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 5 }
      - { color: "red", min: 6, max: 9999 }

  # ─────────────────────────────────────────────────────────────────────
  # nerdz.cloud — additions for hub + /cluster page
  # ─────────────────────────────────────────────────────────────────────

  # ── Health & topology ──
  - name: cluster_health_ready
    query: count(kube_node_status_condition{condition="Ready",status="true"} == 1)
    colors:
      - { color: "green", min: 4, max: 9999 }
      - { color: "orange", min: 1, max: 3 }
      - { color: "red", min: 0, max: 0 }

  - name: cluster_health_total
    query: count(kube_node_info)

  - name: cluster_temp_avg
    # Average across CPU coretemp + PCH + NVMe sensors — biased toward "is the rack hot"
    query: round(avg(node_hwmon_temp_celsius{chip=~"coretemp.*|.*pch.*|.*nvme.*"}), 1)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 60 }
      - { color: "orange", min: 60, max: 75 }
      - { color: "red", min: 75, max: 9999 }

  - name: cluster_uptime_seconds
    # Avg node uptime in seconds — page formats to "Nd HH:MM:SS"
    query: round(avg(node_time_seconds - node_boot_time_seconds))

  # ── Workloads ──
  - name: cluster_pods_pending
    query: sum(kube_pod_status_phase{phase="Pending"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 5 }
      - { color: "red", min: 6, max: 9999 }

  - name: cluster_pods_failed
    query: sum(kube_pod_status_phase{phase="Failed"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 2 }
      - { color: "red", min: 3, max: 9999 }

  - name: cluster_deployments_ready
    query: sum(kube_deployment_status_replicas_ready)

  - name: cluster_deployments_desired
    query: sum(kube_deployment_spec_replicas)

  # ── Media library (Plex / Tautulli) ──
  - name: plex_library_total
    query: sum(plex_library_items)

  - name: plex_library_movies
    query: sum(plex_media_movies)

  - name: plex_library_episodes
    query: sum(plex_media_episodes)

  - name: plex_active_streams
    query: tautulli_stream_count OR vector(0)

  - name: plex_active_transcodes
    query: tautulli_stream_count_transcode OR vector(0)

  # ── Arr stack ──
  - name: radarr_movies_monitored
    query: sum(radarr_movie_monitored_total)

  - name: sonarr_episodes_total
    query: sum(sonarr_episode_total)

  - name: sonarr_episodes_missing
    query: sum(sonarr_episode_missing_total)
    colors:
      - { color: "green", min: 0, max: 10 }
      - { color: "orange", min: 11, max: 100 }
      - { color: "red", min: 101, max: 9999 }

  # ── Internet ──
  # Speedtest scrapes hourly; instant queries miss the 5m staleness window,
  # so wrap each metric in last_over_time to surface the most recent run.
  - name: speedtest_download_mbps
    query: round(last_over_time(speedtest_download_bits_per_second[2h]) / 1000000, 1)
    suffix: " Mbps"
    colors:
      - { color: "green", min: 100, max: 9999 }
      - { color: "orange", min: 25, max: 99 }
      - { color: "red", min: 0, max: 24 }

  - name: speedtest_upload_mbps
    query: round(last_over_time(speedtest_upload_bits_per_second[2h]) / 1000000, 1)
    suffix: " Mbps"
    colors:
      - { color: "green", min: 25, max: 9999 }
      - { color: "orange", min: 10, max: 24 }
      - { color: "red", min: 0, max: 9 }

  - name: speedtest_ping_ms
    query: round(last_over_time(speedtest_ping_latency_milliseconds[2h]), 1)
    suffix: " ms"
    colors:
      - { color: "green", min: 0, max: 30 }
      - { color: "orange", min: 31, max: 80 }
      - { color: "red", min: 81, max: 9999 }

  # ── Storage health ──
  - name: smart_disks_failing
    query: count(smartctl_device_smart_status == 0) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 1 }
      - { color: "red", min: 2, max: 9999 }

  # ── UPS depth (beyond existing cluster_power_usage) ──
  - name: ups_battery_charge_pct
    query: avg(network_ups_tools_battery_charge)
    suffix: "%"
    colors:
      - { color: "green", min: 90, max: 100 }
      - { color: "orange", min: 50, max: 89 }
      - { color: "red", min: 0, max: 49 }

  - name: ups_battery_runtime_minutes
    query: round(min(network_ups_tools_battery_runtime) / 60)
    suffix: " min"
    colors:
      - { color: "green", min: 20, max: 9999 }
      - { color: "orange", min: 5, max: 19 }
      - { color: "red", min: 0, max: 4 }

  # ─────────────────────────────────────────────────────────────────────
  # nerdz.cloud — observability audit 2026-05 additions
  # Depends on expanded kube-state-metrics collectors and nvidia-gpu-exporter
  # ─────────────────────────────────────────────────────────────────────

  # ── Storage (Tier 4) ──
  - name: cluster_pvc_bound
    query: sum(kube_persistentvolumeclaim_status_phase{phase="Bound"}) OR vector(0)

  - name: cluster_pvc_pending
    query: sum(kube_persistentvolumeclaim_status_phase{phase="Pending"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 5 }
      - { color: "red", min: 6, max: 9999 }

  - name: cluster_pvc_lost
    query: sum(kube_persistentvolumeclaim_status_phase{phase="Lost"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "red", min: 1, max: 9999 }

  - name: cluster_pv_count
    query: count(kube_persistentvolume_info) OR vector(0)

  - name: cluster_storageclass_count
    query: count(kube_storageclass_info) OR vector(0)

  # ── Workloads (Tier 3 — enabled by new KSM collectors) ──
  - name: cluster_statefulsets_ready
    query: sum(kube_statefulset_status_replicas_ready) OR vector(0)

  - name: cluster_statefulsets_desired
    query: sum(kube_statefulset_replicas) OR vector(0)

  - name: cluster_daemonsets_ready
    query: sum(kube_daemonset_status_number_ready) OR vector(0)

  - name: cluster_daemonsets_desired
    query: sum(kube_daemonset_status_desired_number_scheduled) OR vector(0)

  - name: cluster_jobs_running
    query: sum(kube_job_status_active) OR vector(0)

  - name: cluster_jobs_failed
    query: sum(kube_job_failed{condition="true"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 5 }
      - { color: "red", min: 6, max: 9999 }

  - name: cluster_cronjobs_count
    query: count(kube_cronjob_info) OR vector(0)

  - name: cluster_services_count
    query: count(kube_service_info) OR vector(0)

  - name: cluster_namespaces_count
    query: count(kube_namespace_created) OR vector(0)

  # ── GitOps health (Tier 5) ──
  # gotk_resource_info is published by kube-state-metrics' customResourceState
  # collector. Includes a `ready=True|False|Unknown` label per resource.
  - name: flux_helmreleases_ready
    query: count(gotk_resource_info{customresource_kind="HelmRelease",ready="True"}) OR vector(0)

  - name: flux_helmreleases_total
    query: count(gotk_resource_info{customresource_kind="HelmRelease"}) OR vector(0)

  - name: flux_helmreleases_failing
    query: count(gotk_resource_info{customresource_kind="HelmRelease",ready="False"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 2 }
      - { color: "red", min: 3, max: 9999 }

  - name: flux_kustomizations_ready
    query: count(gotk_resource_info{customresource_kind="Kustomization",ready="True"}) OR vector(0)

  - name: flux_kustomizations_total
    query: count(gotk_resource_info{customresource_kind="Kustomization"}) OR vector(0)

  - name: flux_kustomizations_failing
    query: count(gotk_resource_info{customresource_kind="Kustomization",ready="False"}) OR vector(0)
    colors:
      - { color: "green", min: 0, max: 0 }
      - { color: "orange", min: 1, max: 2 }
      - { color: "red", min: 3, max: 9999 }

  # ── Intel iGPU (stantons) ──
  # The intel-device-plugin-exporter publishes igpu_* metrics. Package power
  # is whole-die (CPU+iGPU) so this is a useful "are the stantons busy" gauge.
  - name: intel_igpu_package_power_avg
    query: round(avg(igpu_power_package), 1)
    suffix: "w"

  - name: intel_igpu_package_power_total
    query: round(sum(igpu_power_package), 1)
    suffix: "w"

  - name: intel_igpu_video_busy_max
    # Highest sustained video-engine utilisation across all stantons — proxy
    # for "is Plex transcoding" since intel iGPU video engines drive QSV.
    query: round(max(igpu_engines_video_0_busy), 1)
    suffix: "%"

  # ── NVIDIA GPU (pyro-01, via utkuozdemir/nvidia_gpu_exporter) ──
  # NVML-based — dcgm-exporter was tried first but DCGM doesn't support
  # consumer Pascal cards (GTX 1080 Ti). Each query wraps OR vector(0)
  # so the dashboard stays green if the exporter pod restarts or the GPU
  # is genuinely idle (1080 Ti reports near-0W idle).
  - name: nvidia_gpu_temp_c
    query: max(nvidia_smi_temperature_gpu) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 70 }
      - { color: "orange", min: 71, max: 83 }
      - { color: "red", min: 84, max: 9999 }

  - name: nvidia_gpu_util_pct
    query: round(max(nvidia_smi_utilization_gpu_ratio) * 100) OR vector(0)
    suffix: "%"

  - name: nvidia_gpu_power_watts
    query: round(sum(nvidia_smi_power_draw_watts), 1) OR vector(0)
    suffix: "w"

  - name: nvidia_gpu_mem_used_mb
    query: round(sum(nvidia_smi_memory_used_bytes) / 1024 / 1024) OR vector(0)
    suffix: " MiB"

  - name: nvidia_gpu_mem_free_mb
    query: round(sum(nvidia_smi_memory_free_bytes) / 1024 / 1024) OR vector(0)
    suffix: " MiB"

  # ── Per-node power ──
  # Each stanton has a JetKVM with a DC Power Control extension inline
  # between the wall adapter and the MS-01's barrel jack. The extension's
  # INA219 sensor publishes wall-to-host watts as `jetkvm_dc_power_watts`
  # at http://<jetkvm-ip>/metrics (no auth).
  #
  # The OR chain falls back to the CPU-weighted UPS estimate if a JetKVM
  # is offline or has no DC extension attached:
  #   est = total_ups_watts × node_cpu_share
  #
  # pyro-01 is a desktop PC (no inline DC adapter applicable) so it stays
  # on the estimate-only path. No IPMI/BMC on MS-01 (board AHWSA), no
  # smart PDU. AMT vPro is available but doesn't expose power sensors on
  # this firmware — see docs/infrastructure-roadmap/amt-enablement.md.
  - name: node_power_est_stanton01
    query: |
      round(jetkvm_dc_power_watts{node="stanton-01"}, 1)
        OR round(scalar(sum(network_ups_tools_ups_realpower)) * (instance:node_cpu_utilisation:rate5m{instance="10.90.3.101:9100"} / scalar(sum(instance:node_cpu_utilisation:rate5m))), 1)
        OR vector(0)
    suffix: "w"

  - name: node_power_est_stanton02
    query: |
      round(jetkvm_dc_power_watts{node="stanton-02"}, 1)
        OR round(scalar(sum(network_ups_tools_ups_realpower)) * (instance:node_cpu_utilisation:rate5m{instance="10.90.3.102:9100"} / scalar(sum(instance:node_cpu_utilisation:rate5m))), 1)
        OR vector(0)
    suffix: "w"

  - name: node_power_est_stanton03
    query: |
      round(jetkvm_dc_power_watts{node="stanton-03"}, 1)
        OR round(scalar(sum(network_ups_tools_ups_realpower)) * (instance:node_cpu_utilisation:rate5m{instance="10.90.3.103:9100"} / scalar(sum(instance:node_cpu_utilisation:rate5m))), 1)
        OR vector(0)
    suffix: "w"

  - name: node_power_est_pyro01
    # Desktop PC — no inline DC adapter possible. CPU-weighted estimate only.
    query: round(scalar(sum(network_ups_tools_ups_realpower)) * (instance:node_cpu_utilisation:rate5m{instance="10.90.3.111:9100"} / scalar(sum(instance:node_cpu_utilisation:rate5m))), 1) OR vector(0)
    suffix: "w"

  # ── Per-node temperature ──
  # Stantons: max CPU package coretemp. Pyro: GPU temp leads (it's the GPU
  # node, the headline number anyone wants is "how hot is the 1080 Ti")
  # with coretemp fallback if the NVIDIA exporter is offline.
  - name: node_temp_stanton01
    query: round(max(node_hwmon_temp_celsius{kubernetes_node="stanton-01",chip=~"coretemp.*"}), 1) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 60 }
      - { color: "orange", min: 60, max: 75 }
      - { color: "red", min: 75, max: 9999 }

  - name: node_temp_stanton02
    query: round(max(node_hwmon_temp_celsius{kubernetes_node="stanton-02",chip=~"coretemp.*"}), 1) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 60 }
      - { color: "orange", min: 60, max: 75 }
      - { color: "red", min: 75, max: 9999 }

  - name: node_temp_stanton03
    query: round(max(node_hwmon_temp_celsius{kubernetes_node="stanton-03",chip=~"coretemp.*"}), 1) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 60 }
      - { color: "orange", min: 60, max: 75 }
      - { color: "red", min: 75, max: 9999 }

  - name: node_temp_pyro01
    query: round(max(nvidia_smi_temperature_gpu), 1) OR round(max(node_hwmon_temp_celsius{kubernetes_node="pyro-01",chip=~"coretemp.*"}), 1) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 70 }
      - { color: "orange", min: 71, max: 83 }
      - { color: "red", min: 84, max: 9999 }

  # ── Per-node load (CPU utilisation %) ──
  - name: node_load_stanton01
    query: round(instance:node_cpu_utilisation:rate5m{instance="10.90.3.101:9100"} * 100, 1) OR vector(0)
    suffix: "%"
    colors:
      - { color: "green", min: 0, max: 50 }
      - { color: "orange", min: 50, max: 80 }
      - { color: "red", min: 80, max: 9999 }

  - name: node_load_stanton02
    query: round(instance:node_cpu_utilisation:rate5m{instance="10.90.3.102:9100"} * 100, 1) OR vector(0)
    suffix: "%"
    colors:
      - { color: "green", min: 0, max: 50 }
      - { color: "orange", min: 50, max: 80 }
      - { color: "red", min: 80, max: 9999 }

  - name: node_load_stanton03
    query: round(instance:node_cpu_utilisation:rate5m{instance="10.90.3.103:9100"} * 100, 1) OR vector(0)
    suffix: "%"
    colors:
      - { color: "green", min: 0, max: 50 }
      - { color: "orange", min: 50, max: 80 }
      - { color: "red", min: 80, max: 9999 }

  - name: node_load_pyro01
    query: round(instance:node_cpu_utilisation:rate5m{instance="10.90.3.111:9100"} * 100, 1) OR vector(0)
    suffix: "%"
    colors:
      - { color: "green", min: 0, max: 50 }
      - { color: "orange", min: 50, max: 80 }
      - { color: "red", min: 80, max: 9999 }

  # ── Citadel (Dell R730 via iDRAC8 ipmi-exporter) ──
  - name: node_power_citadel
    # Real wattage from iDRAC8 via ipmi-exporter (Probe job="idrac",
    # target=10.90.1.89). DCMI gives the canonical power-consumption reading;
    # falls back to 0 if the exporter is down.
    query: round(ipmi_dcmi_power_consumption_watts{host="citadel"}) OR vector(0)
    suffix: "w"

  - name: citadel_temp_inlet_c
    # Front-panel inlet ambient temperature — rack air temperature proxy.
    query: round(max(ipmi_temperature_celsius{host="citadel",name=~"Inlet.*|Ambient.*"}), 1) OR vector(0)
    suffix: "°C"
    colors:
      - { color: "green", min: 0, max: 30 }
      - { color: "orange", min: 31, max: 40 }
      - { color: "red", min: 41, max: 9999 }

  - name: citadel_temp_exhaust_c
    # Rear exhaust — shows how hard the cooling system is working.
    query: round(max(ipmi_temperature_celsius{host="citadel",name=~"Exhaust.*"}), 1) OR vector(0)
    suffix: "°C"

  - name: citadel_fans_max_rpm
    # Highest fan speed — proxy for thermal stress.
    query: round(max(ipmi_fan_speed_rpm{host="citadel"})) OR vector(0)
    suffix: " RPM"

  - name: citadel_power_state
    # 1 = powered on, 0 = off. Useful for dashboard "node is offline" badge.
    query: max(ipmi_chassis_power_state{host="citadel"}) OR vector(0)
