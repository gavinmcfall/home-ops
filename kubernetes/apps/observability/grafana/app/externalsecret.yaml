---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-admin-secret
    template:
      engineVersion: v2
      data:
        admin-user: "{{ .GRAFANA_ADMIN_USERNAME }}"
        admin-password: "{{ .GRAFANA_ADMIN_PASSWORD }}"
        TESLAMATE_DB_PASSWORD: "{{ .TESLAMATE_POSTGRES_PASS }}" # from teslamate
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "{{ .GRAFANA_POCKETID_CLIENTID }}"
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ .GRAFANA_POCKETID_SECRET }}"
        INFLUXDB_TOKEN: "{{ .CLAUDE_CODE_INFLUX_TOKEN }}" # scoped R/W to the claude-code bucket only (InfluxDB datasource)
        INFLUXDB3_TELEMETRY_TOKEN: "{{ .INFLUXDB3_GRAFANA_TOKEN }}" # read-only (db:*:read) for the InfluxDB 3 telemetry datasource
  dataFrom:
    - extract:
        key: grafana
    - extract:
        key: teslamate
    - extract:
        key: influxdb
    - extract:
        key: influxdb3
