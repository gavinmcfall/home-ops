---
# Renders the complete ipmi.yml config — including iDRAC credentials —
# into a Secret that gets mounted as /etc/ipmi_exporter/ipmi.yml on the
# exporter pod. ipmi_exporter has no native ${ENV} substitution so the
# safest pattern is "render full config from template".
#
# Source: 1Password item `citadel-idrac` with fields IDRAC_USERNAME and
# IDRAC_PASSWORD. ClusterSecretStore `onepassword-connect` already
# provisioned cluster-wide.
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ipmi-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  refreshInterval: 1h
  target:
    name: ipmi-exporter-config
    template:
      engineVersion: v2
      data:
        # The exporter's config file. `default` is the module name referenced
        # by the Probe in probe.yaml. driver `LAN_2_0` = IPMI 2.0 over LAN
        # (UDP 623). privilege `user` is enough for sensor reads; bumping to
        # `operator` or `admin` only buys you control actions we're not using.
        # Collectors picked for power telemetry + chassis health:
        #   - bmc:     BMC info (firmware version, etc.)
        #   - ipmi:    sensor readings (temp, voltage, fan, current)
        #   - chassis: chassis state, intrusion, power state
        #   - dcmi:    DCMI power consumption — gives us ipmi_dcmi_power_consumption_current_watts
        # `sel` is intentionally omitted (System Event Log is high-cardinality and
        # populates ipmi_sel events as separate series — turn on only if you
        # want to alert on hardware events).
        ipmi.yml: |
          modules:
            default:
              user: "{{ .IDRAC_USERNAME }}"
              pass: "{{ .IDRAC_PASSWORD }}"
              driver: "LAN_2_0"
              privilege: "user"
              timeout: 10000
              collectors:
                - bmc
                - ipmi
                - chassis
                - dcmi
  dataFrom:
    - extract:
        key: citadel-idrac
