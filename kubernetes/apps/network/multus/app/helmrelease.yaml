---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: multus
spec:
  interval: 30m
  chart:
    spec:
      chart: multus
      version: 7.0.0
      sourceRef:
        kind: HelmRepository
        name: angelnu
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      # The chart ships `test` + `uninstall` hook controllers. They
      # break `flux-local test` because with 2 ServiceAccounts in the
      # namespace (default + multus) the chart can't auto-pick one.
      # - `test` is just a chart-test artifact, fully disable.
      # - `uninstall` is referenced by the `cni` persistence (cleanup
      #   on helm uninstall), so disabling cascades — pin its SA instead.
      test:
        enabled: false
      uninstall:
        serviceAccount:
          name: multus
      multus:
        containers:
          multus:
            image:
              repository: ghcr.io/k8snetworkplumbingwg/multus-cni
              tag: v4.3.0-thick@sha256:2b9671447f3ea4e7e56730843dbf59445b9307246f393b61386b896d56ae51c9
        initContainers:
          cni-installer:
            image:
              repository: ghcr.io/angelnu/cni-plugins
              tag: 1.9.1@sha256:7e6902f00ba777755e3cab4e90d83d97e4954618593a2e32f3024f5f6f1fb1e9
    cni:
      logLevel: error
      paths:
        bin: /opt/cni/bin
        config: /etc/cni/net.d
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 1024Mi
    hostPaths:
      netns: /var/run/netns
