---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hume-influx
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      hume-influx:
        type: cronjob
        cronjob:
          # Monday noon NZ time (23:00 UTC Sun = noon NZST Mon, 00:00 UTC Mon = noon NZDT Mon)
          # Run at both to cover DST transitions
          schedule: "0 23,0 * * 0,1"
          successfulJobsHistory: 3
          failedJobsHistory: 3
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/hume-influx
              tag: 1.1.0@sha256:70ce679deaf5422599066c4ea740d410363e22c1d2c268d38ff4e732626e68ef
            env:
              TZ: ${TIMEZONE}
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      config:
        type: secret
        name: hume-influx-secret
        globalMounts:
          - path: /app/config.toml
            subPath: config.toml
            readOnly: true
