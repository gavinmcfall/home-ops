---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sparkyfitness
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: sparkyfitness-secret
    template:
      engineVersion: v2
      data:
        # Postgres init (shared cluster)
        INIT_POSTGRES_DBNAME: "{{ .SPARKY_POSTGRES_DB }}"
        INIT_POSTGRES_HOST: postgres18-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .SPARKY_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .SPARKY_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # App database connection (server expects these exact env var names)
        SPARKY_FITNESS_DB_HOST: postgres18-cluster-rw.database.svc.cluster.local
        SPARKY_FITNESS_DB_NAME: "{{ .SPARKY_POSTGRES_DB }}"
        SPARKY_FITNESS_DB_USER: "{{ .SPARKY_POSTGRES_USER }}"
        SPARKY_FITNESS_DB_PASSWORD: "{{ .SPARKY_POSTGRES_PASSWORD }}"
        SPARKY_FITNESS_APP_DB_USER: "{{ .SPARKY_POSTGRES_USER }}"
        SPARKY_FITNESS_APP_DB_PASSWORD: "{{ .SPARKY_POSTGRES_PASSWORD }}"
        # App secrets
        SPARKY_FITNESS_API_ENCRYPTION_KEY: "{{ .SPARKY_API_ENCRYPTION_KEY }}"
        BETTER_AUTH_SECRET: "{{ .SPARKY_BETTER_AUTH_SECRET }}"
        # OIDC
        OIDC_CLIENT_ID: "{{ .SPARKY_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .SPARKY_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: sparkyfitness
    - extract:
        key: cloudnative-pg
