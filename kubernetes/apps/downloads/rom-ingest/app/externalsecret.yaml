---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rom-ingest
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: rom-ingest-secret
    template:
      engineVersion: v2
      data:
        # Add a DISCORD_WEBHOOK_ROMGATE field to the 1Password "discord" item to
        # enable notifications. `index`+`default` tolerates the field being absent
        # (renders empty -> script skips notify) instead of failing the sync.
        DISCORD_WEBHOOK: '{{ index . "DISCORD_WEBHOOK_ROMGATE" | default "" }}'
  dataFrom:
    - extract:
        key: discord
