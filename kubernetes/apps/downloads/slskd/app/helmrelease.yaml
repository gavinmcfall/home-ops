---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app slskd
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      slskd:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/slskd/slskd
              tag: 0.26.0@sha256:ecd4026d4f8fb504e2cc55323efa2c1f5b56d20d3686b018249cc36b48ea17a6
            env:
              TZ: ${TIMEZONE}
              # slskd is a .NET single-file app; with a read-only rootfs it must extract its
              # bundle somewhere writable, else it fails on $HOME/.net.
              DOTNET_BUNDLE_EXTRACT_BASE_DIR: /tmp
              SLSKD_HTTP_PORT: &port 80
              SLSKD_NO_HTTPS: "true"
              SLSKD_NO_VERSION_CHECK: "true"
              SLSKD_REMOTE_CONFIGURATION: "true"
              SLSKD_NO_AUTH: "true"
              SLSKD_APP_DIR: /config
              # VPN integration: slskd polls gluetun's control server for the dynamically
              # forwarded port and uses it as its Soulseek listen port. Without a reachable
              # port, peers can't return search results (0 responses).
              SLSKD_VPN: "true"
              SLSKD_VPN_PORT_FORWARDING: "true"
              SLSKD_VPN_GLUETUN_URL: http://localhost:8000
              SLSKD_SHARED_DIR: /media/Downloads/slskd/shared
              SLSKD_DOWNLOADS_DIR: /media/Downloads/slskd/complete
              SLSKD_INCOMPLETE_DIR: /media/Downloads/slskd/incomplete
              SLSKD_SHARE_FILTER: Thumbs.db$;\.DS_Store$
            envFrom:
              - secretRef:
                  name: slskd-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            env:
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              VPN_INTERFACE: wg0
              VPN_ENDPOINT_PORT: 51820
              VPN_PORT_FORWARDING: on # ProtonVPN NAT-PMP; gluetun opens the forwarded port
              VPN_PORT_FORWARDING_PROVIDER: protonvpn
              DOT: off
              DOT_IPV6: off
              DNS_ADDRESS: 10.96.0.10 # cluster CoreDNS
              FIREWALL_INPUT_PORTS: 80,8000 # 80=slskd web/API, 8000=gluetun control server (health probe)
              FIREWALL_OUTBOUND_SUBNETS: 10.69.0.0/16,10.96.0.0/16 # k8s pod+service subnets
            envFrom:
              - secretRef:
                  name: slskd-secret
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              capabilities:
                add: ["NET_ADMIN"]
              allowPrivilegeEscalation: false
            probes:
              liveness: &gluetunProbe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/publicip/ip
                    port: 8000
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *gluetunProbe
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /v1/publicip/ip
                    port: 8000
                  timeoutSeconds: 10
                  failureThreshold: 30
                  periodSeconds: 5
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: slskd
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: slskd
          gethomepage.dev/app: *app
          gethomepage.dev/icon: slskd.png
          gethomepage.dev/description: Soulseek Client
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: slskd
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      media:
        type: nfs
        server: citadel.internal
        path: /mnt/storage0/media
        globalMounts:
          - path: /media
