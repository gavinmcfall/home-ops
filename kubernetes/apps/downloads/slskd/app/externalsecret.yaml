---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: slskd-secret
    template:
      engineVersion: v2
      data:
        SLSKD_SLSK_USERNAME: "{{ .SLSKD_SLSK_USERNAME }}"
        SLSKD_SLSK_PASSWORD: "{{ .SLSKD_SLSK_PASSWORD }}"
        # Primary API key (Administrator role) — used by the Lidarr/Tubifarry Slskd plugin
        SLSKD_API_KEY: "{{ .SLSKD_API_KEY }}"
        # gluetun (WireGuard / ProtonVPN) — dedicated slskd WG config (see notes)
        VPN_ENDPOINT_IP: "{{ .SLSKD_VPN_ENDPOINT_IP }}"
        WIREGUARD_PRIVATE_KEY: "{{ .SLSKD_WIREGUARD_PRIVATE_KEY }}"
        WIREGUARD_PUBLIC_KEY: "{{ .SLSKD_WIREGUARD_PUBLIC_KEY }}"
        WIREGUARD_ADDRESSES: "{{ .SLSKD_WIREGUARD_ADDRESSES }}"
  dataFrom:
    - extract:
        key: protonvpn
    - extract:
        key: slskd
