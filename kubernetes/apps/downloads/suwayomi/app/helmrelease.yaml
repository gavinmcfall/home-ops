---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suwayomi
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  values:
    controllers:
      suwayomi:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Seed server.conf onto the writable PVC. Suwayomi's entrypoint runs
          # sed -i against server.conf which fails on a configMap subPath bind
          # mount ('Device or resource busy' during atomic rename). Copying the
          # ConfigMap into the PVC sidesteps the bind-mount restriction while
          # keeping the config in git via Reloader (annotation already set).
          01-init-config:
            image:
              repository: docker.io/library/busybox
              tag: 1.36
            command:
              - sh
              - -c
              - |
                set -e
                cp /configmap/server.conf /tachidesk-data/server.conf
                echo "seeded server.conf:"
                ls -la /tachidesk-data/server.conf
                # Suwayomi refuses to start with server.downloadsPath pointing
                # at a non-existent directory; pre-create it on the shared NFS.
                mkdir -p /media/Downloads/suwayomi
                echo "ensured downloads dir exists:"
                ls -ld /media/Downloads/suwayomi
          02-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
            envFrom: &envFrom
              - secretRef:
                  name: suwayomi-secret
        containers:
          app:
            image:
              repository: ghcr.io/suwayomi/tachidesk
              tag: v2.3.2243@sha256:e59f212ccf91b26de8676a063a2db90256c148c6261535c7c477d47a43d9751b
            env:
              TZ: ${TIMEZONE}
              # Suwayomi has no env-var config layer; JVM -D flags drive runtime overrides.
              # K8s $(VAR) expansion pulls DB creds from the secret defined below.
              JAVA_TOOL_OPTIONS: >-
                -Dsuwayomi.tachidesk.config.server.databaseUsername=$(SUWAYOMI_POSTGRES_USER)
                -Dsuwayomi.tachidesk.config.server.databasePassword=$(SUWAYOMI_POSTGRES_PASSWORD)
            envFrom: *envFrom
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 4567
                  initialDelaySeconds: 60
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: Suwayomi
          gethomepage.dev/app: *app
          gethomepage.dev/icon: mdi-book-open-page-variant
          gethomepage.dev/description: Mihon/Tachiyomi self-hosted server
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - "tachi.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    persistence:
      config:
        existingClaim: *app
        advancedMounts:
          suwayomi:
            01-init-config:
              - path: /tachidesk-data
            app:
              - path: /home/suwayomi/.local/share/Tachidesk
      config-file:
        type: configMap
        name: suwayomi
        advancedMounts:
          suwayomi:
            01-init-config:
              - path: /configmap
                readOnly: true
      media:
        type: nfs
        server: citadel.internal
        path: /mnt/storage0/media
        globalMounts:
          - path: /media
    configMaps:
      config:
        data:
          server.conf: |
            # Suwayomi-Server config — non-secret only.
            # DB credentials come in via JAVA_TOOL_OPTIONS -D flags from the K8s Secret.

            # === Networking ===
            server.ip = "0.0.0.0"
            server.port = 4567

            # === Auth (internal-only behind Tailscale; enable later if needed) ===
            server.authMode = "none"

            # === Database (PostgreSQL on shared postgres18-cluster) ===
            server.databaseType = "POSTGRESQL"
            server.databaseUrl = "postgresql://postgres18-cluster-rw.database.svc.cluster.local:5432/suwayomi_main"
            server.useHikariConnectionPool = true

            # === Downloads ===
            server.downloadAsCbz = true
            server.downloadsPath = "/media/Downloads/suwayomi"
            server.autoDownloadNewChapters = true
            server.excludeEntryWithUnreadChapters = false
            server.autoDownloadNewChaptersLimit = 0
            server.autoDownloadIgnoreReUploads = true

            # === Global update (scheduled new-chapter checks) ===
            # Key names verified against Suwayomi-Server ServerConfig.kt source.
            # "Pull everything" stance: don't skip series we're behind on or
            # haven't started. globalUpdateInterval is hours (minimum 6).
            server.globalUpdateInterval = 12
            server.excludeUnreadChapters = false
            server.excludeNotStarted = false
            server.excludeCompleted = false
            # Suwayomi-internal metadata refresh; Komf owns Kavita metadata, so
            # leave Suwayomi from re-fetching covers/details every cycle.
            server.updateMangas = false

            # === FlareSolverr (cluster-local service) ===
            server.flareSolverrEnabled = true
            server.flareSolverrUrl = "http://flaresolverr.downloads.svc.cluster.local:8191"
            server.flareSolverrTimeout = 60
            server.flareSolverrSessionName = "suwayomi"
            server.flareSolverrSessionTtl = 15
            server.flareSolverrAsResponseFallback = false

            # === Web UI ===
            server.webUIEnabled = true
            server.initialOpenInBrowserEnabled = false
            server.webUIInterface = "browser"
            server.webUIFlavor = "WebUI"
            server.webUIChannel = "STABLE"
            server.webUIUpdateCheckInterval = 23

            # === Pre-seeded extension repos (Keiyoushi + Yuzono) ===
            server.extensionRepos = [
              "https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json",
              "https://raw.githubusercontent.com/yuzonomanga/yuzono-extensions/repo/index.min.json"
            ]

            # === Misc ===
            server.debugLogsEnabled = false
            server.systemTrayEnabled = false
            server.maxSourcesInParallel = 6
            server.maxLogFiles = 14
            server.maxLogFileSize = "10mb"
            server.maxLogFolderSize = "100mb"
