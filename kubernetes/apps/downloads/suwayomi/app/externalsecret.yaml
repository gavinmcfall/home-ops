---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: suwayomi
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: suwayomi-secret
    template:
      engineVersion: v2
      data:
        SUWAYOMI_POSTGRES_USER: &dbUser "{{ .SUWAYOMI_POSTGRES_USER }}"
        SUWAYOMI_POSTGRES_PASSWORD: &dbPass "{{ .SUWAYOMI_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_DBNAME: suwayomi_main
        INIT_POSTGRES_HOST: postgres18-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: cloudnative-pg
    - extract:
        key: suwayomi
