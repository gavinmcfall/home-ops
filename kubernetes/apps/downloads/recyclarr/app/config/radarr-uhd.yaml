# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
###################################################################################################
# Recyclarr Configuration: UHD Bluray + WEB (SQP-1 2160p)                                         #
# v8 schema: guide-backed quality_profile via trash_id.                                           #
###################################################################################################

radarr:
  uhd-bluray-web:
    base_url: http://radarr-uhd.downloads.svc.cluster.local:80
    api_key: !env_var RADARR_UHD_API_KEY
    delete_old_custom_formats: true
    media_naming:
      folder: plex-imdb
      movie:
        rename: true
        standard: plex-imdb

    # Old config used radarr-quality-definition-sqp-streaming; preserve that sizing.
    quality_definition:
      type: sqp-streaming

    quality_profiles:
      # SQP-1 (2160p) — override [SQP] SQP-1 (2160p) guide name to preserve existing binding
      - trash_id: 5128baeb2b081b72126bc8482b2a86a0
        name: SQP-1 (2160p)
        reset_unmatched_scores:
          enabled: false

    custom_formats:
      # Audio
      - trash_ids:
          # Uncomment the next section to enable Advanced Audio Formats
          # - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
          # - 2f22d89048b01681dde8afe203bf2e95 # DTS X
          # - 417804f7f2c4308c1f4c5d380d4c4475 # ATMOS (undefined)
          # - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
          # - 3cafb66171b47f226146a0770576870f # TrueHD
          # - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
          # - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
          # - e7c2fcae07cbada050a0af3357491d7b # PCM
          # - 8e109e50e0a0b83a5098b056e13bf6db # DTS-HD HRA
          # - 185f1dd7264c4562b9022d963ac37424 # DD+
          # - f9f847ac70a0af62ea4a08280b859636 # DTS-ES
          # - 1c1a4c5e823891c75bc50380a6866f73 # DTS
          # - 240770601cc226190c367ef59aba7463 # AAC
          # - c2998bd0d90ed5621d8df281e839436e # DD
        assign_scores_to:
          - name: SQP-1 (2160p)

      # Movie Versions
      - trash_ids:
          - 9f6cbff8cfe4ebbc1bde14c7b7bec0de # IMAX Enhanced
        assign_scores_to:
          - name: SQP-1 (2160p)
            # score: 0 # Uncomment this line to disable prioritised IMAX Enhanced releases

      # Unwanted (based on onedr0p's config)
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          # - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL) — retired upstream, see radarr.yaml notes
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
        assign_scores_to:
          - name: SQP-1 (2160p)

      - trash_ids:
          - dc98083864ea246d05a42df0d05f81cc # x265 (HD)
        assign_scores_to:
          - name: SQP-1 (2160p)
            score: 20
      - trash_ids:
          - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
        assign_scores_to:
          - name: SQP-1 (2160p)
            score: 20

      # HDR / DV — upstream retired several boost CFs in v8; replacements noted below.
      - trash_ids:
          # Comment out the next line if you and all of your users' setups are fully DV compatible
          - 923b6abef9b17f937fab56cfcf89e1f1 # DV (w/o HDR fallback)  (was "DV (WEBDL)" pre-v8)

          # HDR10+ Boost — trash_id renamed upstream
          - caa37d0df9c348912df1fb1d88f9273a # HDR10+ Boost  (was b17886cb...)
          # NOTE: The pre-v8 combined "DV HDR10+ Boost" (55a5b50c...) was retired upstream;
          #       use the separate "DV Boost" if you want DV preference.
          # - b337d6812e06c200ec9a2d3cfa9d20a7 # DV Boost
        assign_scores_to:
          - name: SQP-1 (2160p)

      # Unwanted (based on onedr0p's config) SDR
      # Only ever use ONE of the following custom formats:
      # SDR - block ALL SDR releases
      # SDR (no WEBDL) - block UHD/4k Remux and Bluray encode SDR releases, but allow SDR WEB
      - trash_ids:
          - 9c38ebb7384dada637be8899efa68e6f # SDR
          # - 25c12f78430a3a23413652cbd1d48d77 # SDR (no WEBDL)
        assign_scores_to:
          - name: SQP-1 (2160p)
