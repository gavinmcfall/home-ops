# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
###################################################################################################
# Recyclarr Configuration: Anime Sonarr (same Sonarr instance as sonarr.yaml)                     #
# v8 schema: guide-backed quality_profile via trash_id.                                           #
# anime-sonarr-v4 reuses base_url + SONARR_API_KEY; recyclarr supports multiple                   #
# instances against one service so long as each YAML scopes its own profile work.                 #
###################################################################################################

sonarr:
  anime-sonarr-v4:
    base_url: http://sonarr.downloads.svc.cluster.local:80
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    media_naming:
      series: plex-imdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: anime

    quality_profiles:
      # Remux-1080p - Anime — override to preserve existing Sonarr profile name
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f
        name: Remux-1080p - Anime
        reset_unmatched_scores:
          enabled: false

    # Custom Formats: https://recyclarr.dev/reference/configuration/custom-formats/
    custom_formats:
      # Unwanted (core filters for anime)
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: Remux-1080p - Anime

      # Anime-specific formats
      - trash_ids:
          - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 100

      - trash_ids:
          - 9c14d194486c4014d422adc64092d794 # Dubs Only
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 100

      - trash_ids:
          - 69aa1e159f97d860440b04cd6d590c4f # Language: Not English
        assign_scores_to:
          - name: Remux-1080p - Anime
