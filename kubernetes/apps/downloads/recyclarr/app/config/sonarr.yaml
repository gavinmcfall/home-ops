# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
###################################################################################################
# Recyclarr Configuration: WEB-1080p (V4) + Anime                                                 #
# v8 schema: guide-backed quality_profiles via trash_id.                                          #
# Profile names overridden to preserve existing bindings in Sonarr.                               #
###################################################################################################

# Instance Definition: https://recyclarr.dev/reference/configuration/basic/
sonarr:
  web-1080p-v4:
    base_url: http://sonarr.downloads.svc.cluster.local:80
    api_key: !env_var SONARR_API_KEY
    delete_old_custom_formats: true
    media_naming:
      series: plex-imdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    quality_profiles:
      # WEB-1080p — guide name matches, no override needed
      - trash_id: 72dae194fc92bf828f32cde7744e51a1
        reset_unmatched_scores:
          enabled: false
      # Remux-1080p - Anime — override to preserve existing Sonarr profile name
      - trash_id: 20e0fc959f1f1704bed501f23bdae76f
        name: Remux-1080p - Anime
        reset_unmatched_scores:
          enabled: false

    # Custom Formats: https://recyclarr.dev/reference/configuration/custom-formats/
    custom_formats:
      # Unwanted (based on onedr0p's config)
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: WEB-1080p

      - trash_ids:
          # Uncomment the next six lines to allow x265 HD releases with HDR/DV
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-1080p
            score: 20
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-1080p
            score: 20
      - trash_ids:
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
        assign_scores_to:
          - name: WEB-1080p
            score: 10

      # Anime Custom Formats
      - trash_ids:
          - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 3000 # Gatekeeper: required for min_format_score threshold

      - trash_ids:
          - 9c14d194486c4014d422adc64092d794 # Dubs Only
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 3000 # Gatekeeper: required for min_format_score threshold

      - trash_ids:
          - 69aa1e159f97d860440b04cd6d590c4f # Language: Not English
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Neutralize - anime is expected to be non-English
