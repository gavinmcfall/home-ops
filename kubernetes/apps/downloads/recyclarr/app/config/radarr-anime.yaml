# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
###################################################################################################
# Recyclarr Configuration: Anime Radarr (same Radarr instance as radarr.yaml)                     #
# v8 schema: guide-backed quality_profile via trash_id.                                           #
###################################################################################################

radarr:
  anime-radarr:
    base_url: http://radarr.downloads.svc.cluster.local:80
    api_key: !env_var RADARR_API_KEY
    delete_old_custom_formats: true
    media_naming:
      folder: plex-imdb
      movie:
        rename: true
        standard: plex-imdb

    quality_definition:
      type: anime

    quality_profiles:
      # Remux-1080p - Anime — override [Anime] Remux-1080p to preserve existing binding
      - trash_id: 722b624f9af1e492284c4bc842153a38
        name: Remux-1080p - Anime
        reset_unmatched_scores:
          enabled: false

    custom_formats:
      # Unwanted (core filters for anime)
      # NOTE: "EVO (no WEBDL)" was renamed upstream to "LQ (Release Title)" (e204b80c...).
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - e204b80c87be9497a8a6eaff48f72905 # LQ (Release Title)  (was malformed "EVO (no WEBDL)")
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
        assign_scores_to:
          - name: Remux-1080p - Anime

      # Anime-specific formats
      - trash_ids:
          - 064af5f084a0a24458cc8ecd3220f93f # Uncensored
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - a5d148168c4506b55cf53984107c396e # 10bit
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired

      - trash_ids:
          - 4a3b087eea2ce012fcc1ce319259a3be # Anime Dual Audio
        assign_scores_to:
          - name: Remux-1080p - Anime
            score: 0 # Adjust scoring as desired
