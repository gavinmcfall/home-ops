# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
###################################################################################################
# Recyclarr Configuration: WEB-2160p (V4)                                                         #
# v8 schema: guide-backed quality_profile via trash_id.                                           #
###################################################################################################

sonarr:
  web-2160p-v4:
    base_url: http://sonarr-uhd.downloads.svc.cluster.local:80
    api_key: !env_var SONARR_UHD_API_KEY
    delete_old_custom_formats: true
    media_naming:
      series: plex-imdb
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default

    quality_definition:
      type: series

    quality_profiles:
      # WEB-2160p — guide name matches existing profile
      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6
        reset_unmatched_scores:
          enabled: false

    custom_formats:
      # HDR Formats
      - trash_ids:
          # Comment out the next line if you and all of your users' setups are fully DV compatible
          - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)  (was "DV (WEBDL)" pre-v8)

          # HDR10+ Boost - guide trash_id renamed in upstream v8 cleanup
          - 0c4b99df9206d2cfac3c05ab897dd62a # HDR10+ Boost  (was 0dad0a50...)
          # NOTE: The pre-v8 combined "DV HDR10+ Boost" (385e9e85...) was retired upstream;
          #       use "DV Boost" (7c3a61a9c6cb04f52f1544be6d44a026) instead if you want DV boost.
          # - 7c3a61a9c6cb04f52f1544be6d44a026 # DV Boost
        assign_scores_to:
          - name: WEB-2160p

      # Unwanted (based on onedr0p's config)
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
        assign_scores_to:
          - name: WEB-2160p

      - trash_ids:
          - 47435ece6b99a0b477caf360e79ba0bb # x265 (HD)
        assign_scores_to:
          - name: WEB-2160p
            score: 20
      - trash_ids:
          - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
        assign_scores_to:
          - name: WEB-2160p
            score: 20

      # Optional SDR
      # Only ever use ONE of the following custom formats:
      # SDR - block ALL SDR releases
      # SDR (no WEBDL) - block UHD/4k Remux and Bluray encode SDR releases, but allow SDR WEB
      - trash_ids:
          - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
          # - 83304f261cf516bb208c18c54c0adf97 # SDR (no WEBDL)
        assign_scores_to:
          - name: WEB-2160p
