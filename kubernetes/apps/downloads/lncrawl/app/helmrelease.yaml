---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lncrawl
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: storage
  values:
    controllers:
      lncrawl:
        labels:
          nfsMount: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            # Lightnovel Crawler — web UI for fetching fan-translated web novels
            # (NovelUpdates + translator sites) as EPUBs. SQLite in /data.
            image:
              repository: ghcr.io/lncrawl/lightnovel-crawler
              tag: 4.6.0@sha256:445d8da2accd2803125e391773bb927f972c21d05f961ec4d4c9b114d90d84be
            args: ["-ll", "server", "-p", "8080"]
            env:
              LNCRAWL_DATA_PATH: /data
              PYTHONUNBUFFERED: "1"
              TZ: ${TIMEZONE}
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 3Gi
          # lncrawl stores built EPUBs in /data/novels/<uuid>/artifacts/ and has
          # no setting to write elsewhere. This sidecar copies each newly-built
          # EPUB into the Calibre inbox on the NFS share. The -newer marker means
          # each artifact syncs once (and again only if lncrawl rebuilds it), so
          # processed books removed from the inbox are not re-copied.
          inbox-sync:
            image:
              repository: docker.io/library/busybox
              tag: "1.36"
            command: ["/bin/sh", "-c"]
            args:
              - |
                [ -f /data/.inbox-marker ] || touch /data/.inbox-marker
                while true; do
                  find /data/novels -name '*.epub' -type f -newer /data/.inbox-marker -exec cp {} /media/Library/Books/_inbox/ \;
                  touch /data/.inbox-marker
                  sleep 120
                done
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 16Mi
              limits:
                memory: 64Mi
    defaultPodOptions:
      labels:
        nfsMount: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: Lightnovel Crawler
          gethomepage.dev/app: *app
          gethomepage.dev/icon: mdi-book-search
          gethomepage.dev/description: Fan-translated web novels -> EPUB
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
      # Custom crawler modules for translator sites lncrawl ships no source for.
      # lncrawl globs /app/sources/**/*.py and loads any it finds as non-indexed
      # crawlers; mounting under en/ registers them as English-language sources.
      custom-sources:
        type: configMap
        name: lncrawl-custom-sources
        globalMounts:
          - path: /app/sources/en/custom
            readOnly: true
      # Mount the shared library so EPUBs can be sent to the Calibre inbox
      media:
        type: nfs
        server: citadel.internal
        path: /mnt/storage0/media
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
