---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.38.1
  # 4 replicas (was 6) — 6 across 3 viable stantons (pyro tainted) ran 2 per
  # node, which couldn't lose any stanton without violating maxSkew=1 spread.
  # 4 across 3 nodes (typically 2/1/1) survives losing one node cleanly.
  # Discovered 2026-05-19 during Phase 4 stanton-01 drain (dragonfly-4 went
  # Pending because no node could satisfy spread + pod-cap).
  replicas: 4
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --cache_mode=true
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --default_lua_flags=allow-undeclared-keys
    - --shard_repl_backlog_len=8192
  resources:
    requests:
      cpu: 100m
      memory: 3Gi
    limits:
      memory: 4Gi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      nodeTaintsPolicy: Honor
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
