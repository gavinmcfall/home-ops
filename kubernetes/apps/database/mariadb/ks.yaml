---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mariadb
  namespace: &namespace database
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: volsync
      namespace: storage
    - name: cluster-apps-rook-ceph-cluster
      namespace: rook-ceph
  path: ./kubernetes/apps/database/mariadb/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 8Gi
      VOLSYNC_MINUTE: "10"
      # Clone bypasses snapshot-binding race; mariadb's active writes were
      # hitting the polling window and generating OOS alerts (2026-05-19).
      VOLSYNC_COPYMETHOD: Clone
      VOLSYNC_B2_MINUTE: "4"
