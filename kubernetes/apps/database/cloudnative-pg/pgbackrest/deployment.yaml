---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: pgbackrest-controller
  name: pgbackrest-controller
  namespace: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbackrest-controller
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: pgbackrest-controller
    spec:
      containers:
        - name: pgbackrest-controller
          image: registry.hub.docker.com/dalibo/cnpg-pgbackrest-controller:0.0.2@sha256:6ada97fdc4b797ef03abe656ff66f5ba27ac9d6784f3bc9abfa75a0d4807105e
          imagePullPolicy: IfNotPresent
          args:
            - operator
            - --server-cert=/server/tls.crt
            - --server-key=/server/tls.key
            - --client-cert=/client/tls.crt
            - --server-address=:9090
            - --log-level=debug
          env:
            - name: SIDECAR_IMAGE
              value: registry.hub.docker.com/dalibo/cnpg-pgbackrest-sidecar:0.0.2@sha256:b4feb69660a67320590358f435fda7bf5733b7151bca297aef970c2edf54e008
            # The plugin injects a plugin-pgbackrest-exporter init container into every
            # instance pod even when PluginConfig.exporterConfig.enabled: false.
            # Without SIDECAR_EXPORTER_IMAGE, the init container defaults to a bare
            # "pgbackrest-sidecar-exporter" ref that resolves to docker.io/library/...
            # which doesn't exist, blocking the standby rollout with ImagePullBackOff.
            - name: SIDECAR_EXPORTER_IMAGE
              value: registry.hub.docker.com/dalibo/cnpg-pgbackrest-sidecar-exporter:0.0.2@sha256:92b26f75fccd2b37fcc6b45505c10ed1e2ddb32aca5ca3b68eec8b1b893cd7a9
          ports:
            - containerPort: 9090
              protocol: TCP
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 10
            tcpSocket:
              port: 9090
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - mountPath: /server
              name: server
            - mountPath: /client
              name: client
      serviceAccountName: pgbackrest-controller
      volumes:
        - name: server
          secret:
            secretName: pgbackrest-controller-server-tls
        - name: client
          secret:
            secretName: pgbackrest-controller-client-tls
