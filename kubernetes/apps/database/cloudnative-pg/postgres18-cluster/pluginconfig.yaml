---
# Hypothesis 1 experiment (Path B follow-up 2026-05-12):
# The plugin sidecar wasn't loading the Stanza's S3 config into pgbackrest
# even though the Stanza CR was correctly persisted and the auto-generated
# Role granted access. Adding the optional PluginConfig CR and referencing
# it from the Cluster spec, in case the plugin's reconciler only fires the
# config-injection path when a PluginConfig is bound.
apiVersion: pgbackrest.dalibo.com/v1
kind: PluginConfig
metadata:
  name: postgres18-cluster-pluginconfig
  namespace: database
spec:
  # storageClass is a -required- field per the CRD docstring
  # (`kubectl explain pluginconfig.spec.storageConfig.storageClass`).
  # Omitting it caused a nil pointer dereference in injectWALVolume:455
  # (H1 attempt, commit 05a9fd741). The PVC backs the pgBackRest sidecar
  # WAL spool when async archiving is enabled, which this Stanza uses
  # (archive.async: true). openebs-hostpath matches the existing pgdata
  # PVC class — local fast staging, no replication needed.
  storageConfig:
    storageClass: openebs-hostpath
  exporterConfig:
    enabled: false
    collectInterval: 600
