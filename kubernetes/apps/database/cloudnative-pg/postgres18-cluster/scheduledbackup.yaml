---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres18-cluster-daily-b2
  namespace: database
spec:
  schedule: "0 0 3 * * *"        # 6-field (sec min hour dom mon dow): 03:00 daily. WAS "0 3 * * *" which CNPG's 6-field parser read as hourly-at-:03
  immediate: true
  backupOwnerReference: self
  method: plugin
  target: primary
  cluster:
    name: postgres18-cluster
  pluginConfiguration:
    name: pgbackrest.dalibo.com
    parameters:
      selectedRepository: "1"
      backupType: incr        # explicit (was implicit default); weekly full re-bases the chain
