---
# Structural fix for postgres superuser password drift after power cuts.
#
# Root cause: CNPG's cnpg.io/reload mechanism only reconciles the password when
# the cloudnative-pg-secret *changes*. After a power cut, 1Password content is
# unchanged so ESO produces an identical secret, no change event fires, and CNPG
# never re-applies the password during recovery. This leaves postgres with a
# different password than the one stored in the secret.
#
# This CronJob bypasses that problem by exec-ing into the primary pod and running
# ALTER USER via the local unix socket, which uses peer auth (no password needed).
# It runs every 5 minutes so any drift is corrected automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-password-sync
  namespace: database
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: postgres-password-sync
  namespace: database
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: postgres-password-sync
  namespace: database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: postgres-password-sync
subjects:
  - kind: ServiceAccount
    name: postgres-password-sync
    namespace: database
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.33.0/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-password-sync
  namespace: database
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: postgres-password-sync
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: password-sync
              image: bitnami/kubectl:latest@sha256:f6dd048d1c14d89ede9636cd6bee0ff0238579c33ea1e51b2fb1a1cfd62ea246
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -eu
                  PRIMARY=$(kubectl get pods -n database \
                    -l "cnpg.io/cluster=postgres18-cluster,cnpg.io/instanceRole=primary" \
                    -o jsonpath='{.items[0].metadata.name}')
                  if [ -z "$PRIMARY" ]; then
                    echo "ERROR: no running primary pod found"
                    exit 1
                  fi
                  echo "Syncing password to primary: $PRIMARY"
                  PASS=$(cat /secrets/password)
                  echo "ALTER USER postgres WITH PASSWORD \$pwd\$$PASS\$pwd\$;" | \
                    kubectl exec -n database "$PRIMARY" -i -- psql -U postgres
                  echo "Done."
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              volumeMounts:
                - name: secret
                  mountPath: /secrets
                  readOnly: true
          volumes:
            - name: secret
              secret:
                secretName: cloudnative-pg-secret
                items:
                  - key: password
                    path: password
