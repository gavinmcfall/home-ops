---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres18-cluster-weekly-full-b2
  namespace: database
spec:
  schedule: "0 0 1 * * 0"        # 6-field: Sunday 01:00 UTC — 2h before daily incr, no pgbackrest lock collision
  immediate: false             # premigration full (20260525-005008F) already re-based the chain
  backupOwnerReference: self
  method: plugin
  target: primary
  cluster:
    name: postgres18-cluster
  pluginConfiguration:
    name: pgbackrest.dalibo.com
    parameters:
      selectedRepository: "1"
      backupType: full         # re-bases the incremental chain weekly (caps depth at ~7)
