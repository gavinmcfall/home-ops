---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: influxdb3
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: influxdb3-secret
    template:
      engineVersion: v2
      data:
        INFLUXDB3_ENTERPRISE_LICENSE_EMAIL: "{{ .INFLUXDB3_ENTERPRISE_LICENSE_EMAIL }}"
        # Populated after first-boot token bootstrap (influxdb3 create token --admin)
        INFLUXDB3_ADMIN_TOKEN: "{{ .INFLUXDB3_ADMIN_TOKEN }}"
  dataFrom:
    - extract:
        key: influxdb3
