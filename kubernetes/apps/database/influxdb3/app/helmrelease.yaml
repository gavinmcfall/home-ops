---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app influxdb3
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      influxdb3:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/library/influxdb
              tag: 3-enterprise@sha256:f90450ce9a8b71d21726dbc6b7112e17e09403145c6d12790793ab7c192b5e05
            args:
              - serve
              - --node-id=influxdb3-node0
              - --cluster-id=influxdb3
              - --object-store=s3
              - --bucket=influxdb-telemetry
              - --data-dir=/var/lib/influxdb3
              - --http-bind=0.0.0.0:8181
              - --aws-endpoint=http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc:80
              - --aws-default-region=us-east-1
              - --aws-allow-http
              # Auth stays ON for data; exempt the health endpoint so the k8s probe
              # (which sends no token) doesn't get rejected with MissingToken.
              - --disable-authz=health
            env:
              AWS_ALLOW_HTTP: "true"
            envFrom:
              # OBC-generated creds: AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
              - secretRef:
                  name: influxdb3
              # License email (+ admin token, unused by serve)
              - secretRef:
                  name: influxdb3-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8181
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 4Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1500
        runAsGroup: 1500
        fsGroup: 1500
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: influxdb3
        ports:
          http:
            port: *port
    persistence:
      data:
        existingClaim: influxdb3
        globalMounts:
          - path: /var/lib/influxdb3
