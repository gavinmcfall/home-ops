---
# Postcraft secrets — operator-supplied env that Postcraft reads via envFrom.
# Three Secrets materialised from two 1Password items:
#   1Password item `postcraft`              → Secret postcraft-env
#                                            + Secret postcraft-ghcr-pull-secret
#   1Password item `postcraft-google-oauth` → Secret postcraft-google-oauth-secret
#
# The 1Password `postcraft` item must contain these fields:
#   OIDC_ISSUER_URL              (e.g. https://id.${SECRET_DOMAIN})
#   POSTCRAFT_OIDC_CLIENT_ID     (operator-registered Pocket ID client)
#   POSTCRAFT_OIDC_CLIENT_SECRET (same)
#   POSTCRAFT_ENCRYPTION_KEY     (32 bytes base64: `openssl rand -base64 32`)
#   POSTCRAFT_MS_CLIENT_ID       (maintainer-owned multi-tenant Azure AD app id)
#   GHCR_TOKEN                   (PAT with read:packages scope, scoped if possible
#                                 to the postcraft package)
#
# The 1Password `postcraft-google-oauth` item must contain:
#   POSTCRAFT_GOOGLE_CLIENT_ID
#   POSTCRAFT_GOOGLE_CLIENT_SECRET
# (operator-registered per-project Google Cloud OAuth client per ADR 0001)

# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postcraft
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postcraft-env
    template:
      engineVersion: v2
      data:
        OIDC_ISSUER_URL: "{{ .OIDC_ISSUER_URL }}"
        POSTCRAFT_OIDC_CLIENT_ID: "{{ .POSTCRAFT_OIDC_CLIENT_ID }}"
        POSTCRAFT_OIDC_CLIENT_SECRET: "{{ .POSTCRAFT_OIDC_CLIENT_SECRET }}"
        POSTCRAFT_ENCRYPTION_KEY: "{{ .POSTCRAFT_ENCRYPTION_KEY }}"
        POSTCRAFT_MS_CLIENT_ID: "{{ .POSTCRAFT_MS_CLIENT_ID }}"
  dataFrom:
    - extract:
        key: postcraft
---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postcraft-google-oauth
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postcraft-google-oauth-secret
    template:
      engineVersion: v2
      data:
        POSTCRAFT_GOOGLE_CLIENT_ID: "{{ .POSTCRAFT_GOOGLE_CLIENT_ID }}"
        POSTCRAFT_GOOGLE_CLIENT_SECRET: "{{ .POSTCRAFT_GOOGLE_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: postcraft-google-oauth
---
# Pulls the private ghcr.io/gavinmcfall/postcraft image during phase 1.
# Removed at v1.0.0 per docs/declaration/flows/visibility-flip.md once the
# package is flipped to public on ghcr.io.
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postcraft-ghcr-pull
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postcraft-ghcr-pull-secret
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "gavinmcfall:%s" .GHCR_TOKEN | b64enc }}"}}}
  dataFrom:
    - extract:
        key: postcraft
