---
# Postcraft secrets — all materialised from a single 1Password Connect item.
#
# The 1Password item named `postcraft` must contain these fields:
#   OIDC_ISSUER_URL                (e.g. https://id.${SECRET_DOMAIN})
#   POSTCRAFT_OIDC_CLIENT_ID       (operator-registered Pocket ID client)
#   POSTCRAFT_OIDC_CLIENT_SECRET
#   POSTCRAFT_ENCRYPTION_KEY       (32 bytes base64: `openssl rand -base64 32`)
#   POSTCRAFT_MS_CLIENT_ID         (Azure AD app id — see docs/providers/microsoft.md)
#   POSTCRAFT_GOOGLE_CLIENT_ID     (Google Cloud OAuth client — see docs/providers/gmail.md)
#   POSTCRAFT_GOOGLE_CLIENT_SECRET
#   GHCR_TOKEN                     (PAT with read:packages, scoped to the postcraft package)
#
# This single item produces two Secrets:
#   postcraft-env              → envFrom on the pod (all app env vars)
#   postcraft-ghcr-pull-secret → imagePullSecrets (for the private ghcr.io image)

# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postcraft
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postcraft-env
    template:
      engineVersion: v2
      data:
        OIDC_ISSUER_URL:                "{{ .OIDC_ISSUER_URL }}"
        POSTCRAFT_OIDC_CLIENT_ID:       "{{ .POSTCRAFT_OIDC_CLIENT_ID }}"
        POSTCRAFT_OIDC_CLIENT_SECRET:   "{{ .POSTCRAFT_OIDC_CLIENT_SECRET }}"
        POSTCRAFT_ENCRYPTION_KEY:       "{{ .POSTCRAFT_ENCRYPTION_KEY }}"
        POSTCRAFT_MS_CLIENT_ID:         "{{ .POSTCRAFT_MS_CLIENT_ID }}"
        POSTCRAFT_GOOGLE_CLIENT_ID:     "{{ .POSTCRAFT_GOOGLE_CLIENT_ID }}"
        POSTCRAFT_GOOGLE_CLIENT_SECRET: "{{ .POSTCRAFT_GOOGLE_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: postcraft
---
# Pulls the private ghcr.io/gavinmcfall/postcraft image during phase 1.
# Removed at v1.0.0 per docs/declaration/flows/visibility-flip.md once the
# package is flipped to public on ghcr.io.
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postcraft-ghcr-pull
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: postcraft-ghcr-pull-secret
    template:
      engineVersion: v2
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"ghcr.io":{"auth":"{{ printf "gavinmcfall:%s" .GHCR_TOKEN | b64enc }}"}}}
  dataFrom:
    - extract:
        key: postcraft
