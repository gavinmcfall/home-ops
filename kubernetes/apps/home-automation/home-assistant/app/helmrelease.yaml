---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Installs the codyc1515/ha-contact-energy HACS integration into
          # /config/custom_components/contact_energy before HA starts. Upstream
          # was archived 2024-10-08; we pin to the last commit before archival.
          # See docs/infrastructure-roadmap/contact-energy.md for rationale +
          # fallback plan.
          init-contact-energy:
            image:
              repository: docker.io/alpine/git
              tag: v2.52.0@sha256:d453f54c83320412aa89c391b076930bd8569bc1012285e8c68ce2d4435826a3
            command:
              - /bin/sh
              - -c
            args:
              # NOTE: shell vars escaped as $${VAR} so Flux postBuild.substitute
              # leaves them for the shell. See commit 733e318db (kopia) for the
              # same pattern.
              - |
                set -eu
                REPO="https://github.com/codyc1515/ha-contact-energy.git"
                REF="16826d2b82efb294e33f48f70647d21f551b6bf1"
                DEST="/config/custom_components/contact_energy"
                MARKER="$${DEST}/.pinned-sha"
                WORK="/tmp/ha-contact-energy"

                if [ -f "$${MARKER}" ] && [ "$(cat "$${MARKER}")" = "$${REF}" ] \
                    && [ "$${FORCE_UPDATE:-false}" != "true" ]; then
                  echo "[init-contact-energy] Already pinned at $${REF} — skipping."
                  exit 0
                fi

                echo "[init-contact-energy] Cloning $${REPO} @ $${REF}..."
                rm -rf "$${WORK}"
                git clone --no-checkout --filter=blob:none "$${REPO}" "$${WORK}"
                git -C "$${WORK}" checkout "$${REF}"

                echo "[init-contact-energy] Installing to $${DEST}..."
                mkdir -p /config/custom_components
                rm -rf "$${DEST}"
                cp -r "$${WORK}/custom_components/contact_energy" "$${DEST}"
                printf '%s' "$${REF}" > "$${MARKER}"

                echo "[init-contact-energy] Cleaning up..."
                rm -rf "$${WORK}"

                echo "[init-contact-energy] Done. Installed files:"
                ls -la "$${DEST}"
            env:
              FORCE_UPDATE: "false"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.7.3@sha256:7a6951bc274d802206d9ab2e76885fec8ba4f41707ae31d81207ebe5c73b84fb
            env:
              TZ: ${TIMEZONE}
              HASS_HTTP_TRUSTED_PROXY_1: ${LOCAL_CIDR}
              HASS_HTTP_TRUSTED_PROXY_2: ${CLUSTER_POD_CIDR}
              HASS_HTTP_TRUSTED_PROXY_3: ${CLUSTER_SERVICE_CIDR}
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
          code-server:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.118.0@sha256:4aff9947c113487113201da811564fade1af5f23038b4d683998d024eebbac92
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/config/.vscode",
                "--extensions-dir",
                "/config/.vscode",
                "--port",
                "12321",
                "/config",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: Always
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: home-assistant
        ports:
          http:
            port: &httpPort 8123
          code-server:
            port: &codePort 12321
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hostnames:
          - hass.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
      tesla-key:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hostnames:
          - hass.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/appspecific/com.tesla.3p.public-key.pem
            backendRefs:
              - identifier: app
                port: *httpPort
      code-server:
        annotations:
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - hass-code.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *codePort
    persistence:
      config:
        existingClaim: home-assistant
        globalMounts:
          - path: /config
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
      tts:
        type: emptyDir
        globalMounts:
          - path: /config/tts
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      tesla-key:
        type: configMap
        name: home-assistant-tesla-key
        globalMounts:
          - path: /config/www/.well-known/appspecific/com.tesla.3p.public-key.pem
            subPath: com.tesla.3p.public-key.pem
            readOnly: true
