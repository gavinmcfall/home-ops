---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spyglass-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: spyglass-secret
    template:
      engineVersion: v2
      data:
        SPYGLASS_API_KEY: "{{ .api_key }}"
        # When switching to Postgres + Dragonfly, surface those URLs here too
        # (commented out — uncomment the env keys in helmrelease.yaml in lockstep):
        # SPYGLASS_DATABASE_URL: "{{ .database_url }}"
        # SPYGLASS_REDIS_URL:    "{{ .redis_url }}"
  data:
    - secretKey: api_key
      remoteRef:
        key: spyglass
        property: api_key
    # - secretKey: database_url
    #   remoteRef:
    #     key: spyglass
    #     property: database_url
    # - secretKey: redis_url
    #   remoteRef:
    #     key: spyglass
    #     property: redis_url
