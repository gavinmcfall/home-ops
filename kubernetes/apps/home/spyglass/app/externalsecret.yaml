---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spyglass-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: spyglass-secret
    template:
      engineVersion: v2
      data:
        SPYGLASS_API_KEY: "{{ .SPYGLASS_API_KEY }}"
        # When switching to Postgres + Dragonfly, surface those URLs here too
        # (uncomment in lockstep with the env keys in helmrelease.yaml):
        # SPYGLASS_DATABASE_URL: "{{ .SPYGLASS_DATABASE_URL }}"
        # SPYGLASS_REDIS_URL:    "{{ .SPYGLASS_REDIS_URL }}"
  data:
    - secretKey: SPYGLASS_API_KEY
      remoteRef:
        key: spyglass
        property: SPYGLASS_API_KEY
    # - secretKey: SPYGLASS_DATABASE_URL
    #   remoteRef:
    #     key: spyglass
    #     property: SPYGLASS_DATABASE_URL
    # - secretKey: SPYGLASS_REDIS_URL
    #   remoteRef:
    #     key: spyglass
    #     property: SPYGLASS_REDIS_URL
