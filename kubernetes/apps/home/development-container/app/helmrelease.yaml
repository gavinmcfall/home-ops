---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: development-container
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      # Tailscale SSH needs tailscaled running as root to open login sessions;
      # SSH sessions land as gavin (uid 1000) per the tailnet ACL ssh-user.
      # fsGroup 1000 keeps the PVC files (owned by gavin) writable to my group.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      development-container:
        type: deployment
        # RWO PVCs: release before re-attach on restart.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/development-container
              # Pinned by digest so the node pulls this exact image (a plain
              # `:latest` got served from the node cache and never updated).
              # Renovate (or a digest bump) advances this on each rebuild.
              tag: latest@sha256:94f6bd49eb4e8f5e1ffa8f0bd5be4e588f4cda2cc74d1931061e9cdc707f82e7
            # Bring up tailscaled (userspace) + Tailscale SSH as `development`,
            # then idle. SSH into `development` lands me HERE as gavin; attach
            # tmux from there.
            command:
              - /bin/bash
              - -c
              - |
                set -e
                tailscaled --tun=userspace-networking --statedir=/home/gavin/.tailscale \
                  --socks5-server=localhost:1055 >/var/log/tailscaled.log 2>&1 &
                until tailscale up --ssh --hostname="${TS_HOSTNAME:-development}" \
                  --authkey="${TS_AUTHKEY}" --accept-routes --accept-dns=false; do
                  echo "waiting for tailscale up..."; sleep 3
                done
                exec sleep infinity
            env:
              TZ: ${TIMEZONE}
              TS_HOSTNAME: development
            envFrom:
              - secretRef:
                  name: development-container-secret
            securityContext:
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: "2"
                memory: 16Gi
              limits:
                memory: 28Gi
          # ---- SMB mount sidecar (non-blocking by design) ----
          # Mounts \\vengeancepc\SC Bridge to /mnt/e/SCBridge in a retry loop and
          # shares it into `app` via mountPropagation. The shared volume is an
          # emptyDir (always mounts instantly), so the pod NEVER blocks on startup
          # if the PC is off — the sidecar just keeps retrying and /mnt/e/SCBridge
          # stays empty until vengeancepc is reachable. `soft` mount opts + a stale
          # check mean runtime drop-outs fail fast and remount instead of hanging.
          smb-mount:
            image:
              repository: docker.io/library/alpine
              tag: "3.21"
            command:
              - /bin/sh
              - -c
              - |
                apk add --no-cache cifs-utils >/dev/null 2>&1 || true
                TARGET=/mnt/e/SCBridge
                OPTS="credentials=/etc/smb/creds,uid=1000,gid=1000,file_mode=0664,dir_mode=0775,noserverino,soft,vers=3.0,mfsymlinks,nobrl,echo_interval=10"
                mkdir -p "$TARGET"
                while true; do
                  if mountpoint -q "$TARGET" && ! timeout 10 ls "$TARGET" >/dev/null 2>&1; then
                    echo "[smb-mount] stale mount; unmounting"; umount -l "$TARGET" 2>/dev/null || true
                  fi
                  if ! mountpoint -q "$TARGET"; then
                    echo "[smb-mount] mounting //10.90.101.86/SC Bridge -> $TARGET"
                    mount.cifs "//10.90.101.86/SC Bridge" "$TARGET" -o "$OPTS" \
                      && echo "[smb-mount] mounted" || echo "[smb-mount] mount failed (PC off?); will retry"
                  fi
                  sleep 15
                done
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    persistence:
      # Persist the WHOLE of /home/gavin so no CLI's state is ever stepped over
      # (.claude/.claude.json, .codex, .gemini, .secrets, .zshrc, .config, .ssh,
      # tailscale identity at ~/.tailscale, etc.). The trade-off: this mount
      # shadows the image's toolchains, so .nvm/.cargo/.rustup/.local/bin are
      # seeded onto the PVC from WSL2 (same arch) and live here. The denylist
      # (development-container repo: config/seed-excludes.txt) keeps the seed to
      # ~18G by dropping regenerable caches; ~/code and ~/.cache are separate
      # mounts below so they are excluded from this PVC.
      home:
        existingClaim: development-container-home
        globalMounts:
          - path: /home/gavin
      code:
        existingClaim: development-container-code
        globalMounts:
          - path: /home/gavin/code
      cache:
        type: emptyDir
        globalMounts:
          - path: /home/gavin/.cache
      # Shared target for the SMB sidecar. emptyDir mounts instantly (pod never
      # blocks); the cifs mount the sidecar lays inside it propagates into `app`.
      scbridge:
        type: emptyDir
        advancedMounts:
          development-container:
            app:
              - path: /mnt/e
                mountPropagation: HostToContainer
            smb-mount:
              - path: /mnt/e
                mountPropagation: Bidirectional
      # cifs credentials file (username/password) — sidecar only.
      smb-creds:
        type: secret
        name: development-container-smb-creds
        advancedMounts:
          development-container:
            smb-mount:
              - path: /etc/smb
