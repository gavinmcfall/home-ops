---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: development-container
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    defaultPodOptions:
      # Tailscale SSH needs tailscaled running as root to open login sessions;
      # SSH sessions land as gavin (uid 1000) per the tailnet ACL ssh-user.
      # fsGroup 1000 keeps the PVC files (owned by gavin) writable to my group.
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    controllers:
      development-container:
        type: deployment
        # RWO PVCs: release before re-attach on restart.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/development-container
              tag: latest
            # Bring up tailscaled (userspace) + Tailscale SSH as `development`,
            # then idle. SSH into `development` lands me HERE as gavin; attach
            # tmux from there.
            command:
              - /bin/bash
              - -c
              - |
                set -e
                tailscaled --tun=userspace-networking --statedir=/var/lib/tailscale \
                  --socks5-server=localhost:1055 >/var/log/tailscaled.log 2>&1 &
                until tailscale up --ssh --hostname="${TS_HOSTNAME:-development}" \
                  --authkey="${TS_AUTHKEY}" --accept-routes --accept-dns=false; do
                  echo "waiting for tailscale up..."; sleep 3
                done
                exec sleep infinity
            env:
              TZ: ${TIMEZONE}
              TS_HOSTNAME: development
            envFrom:
              - secretRef:
                  name: development-container-secret
            securityContext:
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: "2"
                memory: 16Gi
              limits:
                memory: 28Gi
    persistence:
      # Persist ONLY personal state via subPaths — mounting the whole of
      # /home/gavin would shadow the image's toolchains (.nvm/.cargo/.local/
      # bin/claude/.oh-my-zsh). Toolchains come from the image (rebuilt, correct
      # arch); these dirs are the things that must survive a pod restart.
      home:
        existingClaim: development-container-home
        globalMounts:
          - path: /home/gavin/.claude        # conversations + memory
            subPath: claude
          - path: /home/gavin/.config         # app configs
            subPath: config
          - path: /home/gavin/.ssh            # keys
            subPath: ssh
          - path: /home/gavin/.local/share    # atuin db, etc.
            subPath: local-share
          - path: /var/lib/tailscale          # tailnet node identity (no re-auth on restart)
            subPath: tailscale
      code:
        existingClaim: development-container-code
        globalMounts:
          - path: /home/gavin/code
      cache:
        type: emptyDir
        globalMounts:
          - path: /home/gavin/.cache
