---
# Repos (~/code) — sized for code + kept data dirs + regenerated deps.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: development-container-code
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 50Gi
  storageClassName: ceph-block
---
# Home — WHOLE /home/gavin (so every CLI's state + toolchains survive a restart;
# see helmrelease persistence note). Seed ~18G after the denylist; sized to also
# absorb caches that regenerate in-pod (.npm, .local/lib) onto this PVC.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: development-container-home
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 60Gi
  storageClassName: ceph-block
