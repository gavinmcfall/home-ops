---
# Tailscale auth key for the in-pod tailscaled (Tailscale SSH).
# Create a 1Password item `development-container` (vault Kubernetes) with field:
#   TS_AUTHKEY  — a REUSABLE, tagged auth key (tag:dev) from the tailnet admin
#                 console (Settings → Keys → Generate auth key; Reusable + tag).
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: development-container
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: development-container-secret
    template:
      engineVersion: v2
      data:
        TS_AUTHKEY: "{{ .TS_AUTHKEY }}"
        # Scoped 1Password service-account token (R/W on the 'Dev Container'
        # vault, read on 'Kubernetes'). Injected as pod env so `op` / chezmoi's
        # onepasswordRead works before ~/.secrets (now a template) is rendered.
        OP_SERVICE_ACCOUNT_TOKEN: "{{ .OP_SERVICE_ACCOUNT_TOKEN }}"
  dataFrom:
    - extract:
        key: development-container
