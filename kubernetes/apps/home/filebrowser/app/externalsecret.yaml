---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: filebrowser
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: filebrowser-secret
    template:
      engineVersion: v2
      data:
        config.yaml: |
          server:
            sources:
              - path: /folder
                name: Media
          auth:
            methods:
              password:
                enabled: false
              oidc:
                enabled: true
                clientId: "{{ .FILEBROWSER_OIDC_CLIENT_ID }}"
                clientSecret: "{{ .FILEBROWSER_OIDC_CLIENT_SECRET }}"
                issuerUrl: https://id.${SECRET_DOMAIN}
                scopes: openid email profile groups
                userIdentifier: preferred_username
  dataFrom:
    - extract:
        key: filebrowser
