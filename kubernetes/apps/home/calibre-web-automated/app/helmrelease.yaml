---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app calibre-web-automated
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    defaultPodOptions:
      # CWA is an s6-overlay image: it must start as root then drop to PUID/PGID.
      # s6 is contained via the env flags + minimal caps below (rafaribe pattern).
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        runAsNonRoot: false
        seccompProfile: { type: RuntimeDefault }
    controllers:
      calibre-web-automated:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-cs-config:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            command:
              - sh
              - -c
              - mkdir -p /config/calibre-server/tmp && chown -R 568:568 /config/calibre-server
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: true
              capabilities: { drop: ["ALL"], add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"] }
        containers:
          app:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            env:
              TZ: ${TIMEZONE}
              PUID: "568"
              PGID: "568"
              CACHE_DIR: /cache
              # Library + ingest live on NFS — disables SQLite WAL + uses polling watcher
              NETWORK_SHARE_MODE: "true"
              # Let s6-overlay work under a read-only-ish, non-privileged k8s sandbox
              S6_YES_I_WANT_A_WORLD_WRITABLE_RUN_BECAUSE_KUBERNETES: "1"
              S6_READ_ONLY_ROOT: "1"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &port 8083
                    path: /login
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETUID", "SETGID", "FOWNER", "DAC_OVERRIDE"]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          # Headless Calibre Content Server (the API Readarr integrates with).
          # Same image (calibre-server is at /app/calibre/calibre-server), same
          # library volume. Runs as 568 (the NFS file owner) so writes stay
          # consistent with CWA. NOTE: two writers on one metadata.db — see design doc.
          calibre-server:
            image:
              repository: ghcr.io/crocodilestick/calibre-web-automated
              tag: v4.0.6@sha256:c31a738b6d5ec6982c050063dd3f063b6943eb1051fc81144789f840d9093a8d
            command:
              - /app/calibre/calibre-server
              - /calibre-library
              - --listen-on=0.0.0.0
              - --port=8081
              - --enable-local-write
            env:
              TZ: ${TIMEZONE}
              HOME: /config/calibre-server
              CALIBRE_CONFIG_DIRECTORY: /config/calibre-server
              CALIBRE_TEMP_DIR: /config/calibre-server/tmp
            probes:
              liveness: &csprobes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    port: &csport 8081
                    path: /
                  initialDelaySeconds: 20
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 6
              readiness: *csprobes
            securityContext:
              runAsUser: 568
              runAsGroup: 568
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
          content-server:
            port: *csport
    route:
      app:
        annotations:
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - "calibre.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        accessMode: ReadWriteOnce
        size: 5Gi
        storageClass: ceph-block
        globalMounts:
          - path: /config
      # Single NFS export (proven by audiobookshelf), sub-pathed to the eval-only
      # folders so the real 459G Books library is never touched.
      media:
        type: nfs
        server: citadel.internal
        path: /mnt/storage0/media
        globalMounts:
          - path: /cwa-book-ingest
            subPath: Library/Books/_cwa-eval/ingest
          - path: /calibre-library
            subPath: Library/Books/_cwa-eval/library
      tmpfs:
        type: emptyDir
        globalMounts:
          - path: /cache
            subPath: cache
          - path: /tmp
            subPath: tmp
          - path: /run
            subPath: run
