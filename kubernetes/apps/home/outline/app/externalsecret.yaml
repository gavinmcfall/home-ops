---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: outline
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: outline-secret
    template:
      engineVersion: v2
      data:
        # App
        SECRET_KEY: "{{ .OUTLINE_SECRET_KEY }}"
        UTILS_SECRET: "{{ .OUTLINE_UTILS_SECRET }}"
        # Database
        DATABASE_URL: "postgres://{{ .OUTLINE_POSTGRES_USER }}:{{ .OUTLINE_POSTGRES_PASSWORD }}@postgres18-cluster-rw.database.svc.cluster.local/{{ .OUTLINE_POSTGRES_DB }}"
        INIT_POSTGRES_DBNAME: "{{ .OUTLINE_POSTGRES_DB }}"
        INIT_POSTGRES_HOST: postgres18-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .OUTLINE_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .OUTLINE_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # Redis
        REDIS_URL: "redis://dragonfly.database.svc.cluster.local:6379/5"
        # S3
        AWS_ACCESS_KEY_ID: "{{ .OUTLINE_MINIO_ACCESS_KEY }}"
        AWS_SECRET_ACCESS_KEY: "{{ .OUTLINE_MINIO_SECRET_KEY }}"
        # OIDC
        OIDC_CLIENT_ID: "{{ .OUTLINE_OIDC_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .OUTLINE_OIDC_CLIENT_SECRET }}"
  dataFrom:
    - extract:
        key: outline
    - extract:
        key: cloudnative-pg
