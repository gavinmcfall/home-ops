---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app outline
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      outline:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
            envFrom: &envFrom
              - secretRef:
                  name: outline-secret
        containers:
          app:
            image:
              repository: docker.io/outlinewiki/outline
              tag: 1.5.0@sha256:f053574bb63b82846ec3cd7d89ab4b3019073b4dd25fda45f5cdcccc990a7401
            env:
              NODE_ENV: production
              URL: https://docs.${SECRET_DOMAIN}
              PORT: &port "8080"
              ENABLE_UPDATES: "false"
              FORCE_HTTPS: "false"
              WEB_CONCURRENCY: "10"
              DEFAULT_LANGUAGE: en_US
              LOG_LEVEL: info
              # Storage
              FILE_STORAGE: s3
              FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
              FILE_STORAGE_IMPORT_MAX_SIZE: "26214400"
              AWS_REGION: us-east-1
              AWS_S3_ACL: private
              AWS_S3_FORCE_PATH_STYLE: "true"
              AWS_S3_UPLOAD_BUCKET_NAME: outline
              AWS_S3_UPLOAD_BUCKET_URL: http://citadel.internal:9000
              # OIDC
              OIDC_DISPLAY_NAME: Pocket ID
              OIDC_SCOPES: openid profile email
              OIDC_AUTH_URI: https://id.${SECRET_DOMAIN}/authorize
              OIDC_TOKEN_URI: https://id.${SECRET_DOMAIN}/api/oidc/token
              OIDC_USERINFO_URI: https://id.${SECRET_DOMAIN}/api/oidc/userinfo
              OIDC_USERNAME_CLAIM: email
              # SMTP
              SMTP_HOST: smtp-relay.home.svc.cluster.local
              SMTP_PORT: "25"
              SMTP_FROM_EMAIL: outline@${SECRET_DOMAIN}
              SMTP_SECURE: "false"
              # Rate Limiting
              RATE_LIMITER_ENABLED: "true"
              RATE_LIMITER_REQUESTS: "1000"
              RATE_LIMITER_DURATION_WINDOW: "60"
            envFrom: *envFrom
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: *app
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hostnames:
          - docs.${SECRET_DOMAIN}
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
            subPath: tmp
          - path: /home/node
            subPath: node
