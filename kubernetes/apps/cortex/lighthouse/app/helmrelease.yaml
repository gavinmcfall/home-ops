# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: lighthouse
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    defaultPodOptions:
      # UID 568 matches the comfyui-master image (its passwd entry + torch
      # getpwuid). The distroless sidecars run fine as 568 too (no passwd lookup).
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      lighthouse:
        # RWO ceph-block models PVC can't be multi-attached during a rolling
        # update → Recreate.
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          # ── ComfyUI orchestrator-only master ──────────────────────────────
          main:
            image:
              repository: ghcr.io/gavinmcfall/lighthouse
              # Bakes the lighthouse-identity sidebar tab (Phase 5; sidebar-icon rework).
              tag: 0.22.0@sha256:25fd91ae0cba5dd8c753463577e82e1dfe506d87ac540a54849447e5d696b158
            env:
              # comfyui_controlnet_aux annotator weights (DepthAnythingV2 etc.) live
              # on the models PVC under annotators/ — the env var wins over the
              # pack's config.yaml, so the pack finds them there and never attempts
              # a runtime HuggingFace download. Workers get the same weights via
              # lighthouse-model-sync + the matching env in comfyui-worker.service.
              AUX_ANNOTATOR_CKPTS_PATH: /app/models/annotators
              # Belt-and-braces for the Phase-2a pack vetting: the master image
              # docs promise "HF_HUB_OFFLINE at runtime" (auto-download paths fail
              # safe); these make that promise real. All weights are pre-staged on
              # the PVC / worker model dirs.
              HF_HUB_OFFLINE: "1"
              TRANSFORMERS_OFFLINE: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8188 }
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8188 }
                  initialDelaySeconds: 15
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8188 }
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 60
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
              limits:
                # Bumped 8Gi → 24Gi after OOMKill 2026-06-02 during first /distributed/queue
                # smoke (exit 137). Master is --cpu orchestrator-only per design but the
                # comfy-aimdo plugin pins ~14GB host RAM regardless of --cpu, AND ComfyUI
                # appears to load the checkpoint (~6.5GB for SDXL) at validation time
                # before dispatch. 24Gi covers comfy-aimdo pin + SDXL load + ~3-4Gi buffer.
                # Node stanton-03 has 95GB memory, 51% allocated — comfortable.
                memory: 24Gi
            securityContext:
              # ComfyUI + torch write caches under HOME=/app (image rootfs), so
              # this container can NOT use a read-only root filesystem.
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
          # ── licence-gate reverse proxy (the only Service-exposed port) ────
          licence-gate:
            image:
              repository: ghcr.io/gavinmcfall/licence-gate
              # 0.1.13 logs denials (401/403/400/5xx with method/path/user); the
              # gate was previously silent on rejects, which made a forward-auth
              # mis-wire an hour of blind debugging. 404 + success stay unlogged.
              # 0.1.12 made the gallery delete real: POST /history with one of the
              # gate's synthetic disk ids removes the caller's own render file from
              # /output (ownership-checked, fail closed). Needs the /output mount RW below.
              tag: 0.1.13@sha256:cf5eee7536358461b72f832a316a0e92414ea60a023a87e91aaa6b0fb6101849
            env:
              LIGHTHOUSE_LISTEN: ":8000"
              LIGHTHOUSE_UPSTREAM: "http://127.0.0.1:8188"
              LIGHTHOUSE_REGISTRY_PATH: "/etc/lighthouse/registry.json"
              # Mounted allowlist includes DistributedCollector/DistributedSeed so
              # ComfyUI-Distributed (GPU) workflows pass the gate; the built-in
              # default would reject them.
              LIGHTHOUSE_ALLOWLIST_PATH: "/etc/lighthouse/allowlist.json"
              # Persistent output dir (mounted RW below) → durable per-user
              # completed-jobs gallery synthesized from /output/<user>/, surviving
              # master restarts that wipe ComfyUI's in-memory /api/jobs history.
              # RW since 0.1.12: gallery delete removes the caller's own files.
              LIGHTHOUSE_OUTPUT_DIR: "/output"
              # Curated-workflow dir (configMap below): role-scoped App Mode
              # curation overlaid onto each caller's workflow sidebar, served
              # read-only from this gate. Empty would disable curation.
              LIGHTHOUSE_CURATION_DIR: "/etc/lighthouse/curation"
              # Phase-3 cutover: trust X-Forwarded-User/Groups from oauth2-proxy
              # (now in the request path, stripping client-supplied X-Forwarded-*).
              # This is what finally delivers the `groups` claim to the gate, so
              # curation + mature gating come alive. Requires licence-gate ≥ 0.1.11.
              LIGHTHOUSE_TRUST_FORWARDED_HEADERS: "true"
              LIGHTHOUSE_DR_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: lighthouse-secret
                    key: LIGHTHOUSE_DR_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8000 }
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8000 }
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
          # ── model-serve sidecar (ADR 018; LAN exposure is a follow-up) ────
          model-serve:
            image:
              repository: ghcr.io/gavinmcfall/model-serve
              tag: 0.4.1@sha256:226aaaaeed4e3f008a91d6f3ce3b266b818202ba9e34a81308034c248326d090
            env:
              MODELSERVE_LISTEN: ":9090"
              MODELSERVE_ROOT: "/models"
              # Licence registry (mounted below) → tier-filtered /models/manifest:
              # workers sync aux models + only the checkpoints their tier can run.
              MODELSERVE_REGISTRY_PATH: "/etc/lighthouse/registry.json"
              MODELSERVE_TOKEN:
                valueFrom:
                  secretKeyRef:
                    name: lighthouse-secret
                    key: LIGHTHOUSE_WORKER_TOKEN
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 9090 }
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 9090 }
                  initialDelaySeconds: 5
                  periodSeconds: 15
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    service:
      app:
        controller: lighthouse
        # LoadBalancer with Cilium LB-IPAM IP so ComfyUI workers (on LAN, outside
        # cluster) can POST /distributed/job_complete callbacks back to master.
        # The licence-gate proxy on :8000 forwards everything to master :8188 by
        # default, so callback paths pass through transparently — workers never
        # touch master :8188 directly (only-via-licence-gate posture preserved).
        # externalTrafficPolicy: Local preserves worker source IP for NetworkPolicy.
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          io.cilium/lb-ipam-ips: ${LIGHTHOUSE_APP_LBIP}
        ports:
          # The licence-gate proxy — OIDC-gated family surface (via Envoy for
          # browsers) AND worker-callback surface (direct LAN IP for workers
          # POSTing /distributed/job_complete). ComfyUI :8188 is never Service-exposed.
          http:
            port: 8000
      # model-serve gets a LAN IP (Cilium LB-IPAM) so the external GPU workers can
      # fetch models (ADR 018). externalTrafficPolicy: Local preserves the worker
      # source IP so the NetworkPolicy can scope :9090 to the worker subnet; the
      # endpoint is also bearer-token gated (LIGHTHOUSE_WORKER_TOKEN).
      model-serve:
        controller: lighthouse
        type: LoadBalancer
        externalTrafficPolicy: Local
        annotations:
          io.cilium/lb-ipam-ips: ${LIGHTHOUSE_MODELSERVE_LBIP}
        ports:
          http:
            port: 9090
    persistence:
      models:
        existingClaim: lighthouse-models
        advancedMounts:
          lighthouse:
            main:
              - path: /app/models
                readOnly: true
            model-serve:
              - path: /models
      output:
        existingClaim: lighthouse-output
        advancedMounts:
          lighthouse:
            main:
              - path: /app/output
            # RW into the proxy for the durable per-user jobs gallery
            # (LIGHTHOUSE_OUTPUT_DIR=/output): reads to synthesize the listing,
            # deletes (0.1.12 gallery delete) confined to the caller's own bucket
            # by the gate's ownership checks. The gate never creates files here.
            licence-gate:
              - path: /output
      workflows:
        existingClaim: lighthouse-workflows
        advancedMounts:
          lighthouse:
            main:
              - path: /app/workflows
                readOnly: true
      # ComfyUI user-data (/app/user): each caller's SAVED workflows + settings.
      # Persisted so they survive pod restarts (previously on ephemeral rootfs →
      # wiped every roll). RW for the master.
      userdata:
        existingClaim: lighthouse-userdata
        advancedMounts:
          lighthouse:
            main:
              - path: /app/user
      registry:
        type: configMap
        name: lighthouse-registry
        advancedMounts:
          lighthouse:
            licence-gate:
              - path: /etc/lighthouse
            # model-serve reads registry.json for tier-filtered /models/manifest.
            model-serve:
              - path: /etc/lighthouse
                readOnly: true
      # Curated App Mode workflows (manifest + JSONs) → role-scoped, read-only
      # overlay served by the gate (LIGHTHOUSE_CURATION_DIR). Separate mount dir
      # so it doesn't shadow the registry/allowlist configMap at /etc/lighthouse.
      curation:
        type: configMap
        name: lighthouse-curation
        advancedMounts:
          lighthouse:
            licence-gate:
              - path: /etc/lighthouse/curation
      gpu-config:
        type: configMap
        name: lighthouse-comfyui-distributed
        advancedMounts:
          lighthouse:
            main:
              - path: /app/custom_nodes/ComfyUI-Distributed/gpu_config.json
                subPath: gpu_config.json
            # Same gpu_config feeds the proxy's tier-aware dispatch (workers[].tier);
            # default LIGHTHOUSE_GPU_CONFIG_PATH is /config/gpu_config.json (ADR 019).
            licence-gate:
              - path: /config/gpu_config.json
                subPath: gpu_config.json
      tmp:
        type: emptyDir
        advancedMounts:
          lighthouse:
            licence-gate:
              - path: /tmp
            model-serve:
              - path: /tmp
