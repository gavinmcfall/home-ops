---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./pvc.yaml
  - ./externalsecret.yaml
  # OIDC moved to oauth2-proxy (security ns) at the Phase-3 cutover — the Envoy
  # SecurityPolicy + its Backend (backend.yaml/securitypolicy.yaml) were removed.
  - ./helmrelease.yaml
  - ./httproute.yaml
  - ./networkpolicy.yaml
configMapGenerator:
  # licence-gate config mounted at /etc/lighthouse: the licence registry
  # (registry.json) + the node allowlist (allowlist.json, = the intrinsic node
  # set + DistributedCollector/DistributedSeed so distributed workflows validate).
  - name: lighthouse-registry
    files:
      - ./resources/registry.json
      - ./resources/allowlist.json
  # ComfyUI-Distributed worker config + master_delegate_only (orchestrator-only),
  # mounted as gpu_config.json into the plugin dir.
  - name: lighthouse-comfyui-distributed
    files:
      - ./resources/gpu_config.json
  # Curated App Mode workflows (licence-gate LIGHTHOUSE_CURATION_DIR): the manifest
  # + each vetted workflow JSON, served role-filtered + read-only into every
  # caller's workflow sidebar. Canonical source is ../workflows/ (sibling to
  # smoke/). The cross-dir ref relies on Flux kustomize-controller's default
  # LoadRestrictionsNone; a local `kustomize build` needs --load-restrictor=none.
  - name: lighthouse-curation
    files:
      - ../workflows/curation.json
      - ../workflows/portrait-sdxl-hires-facedetailer.workflow.json
      - ../workflows/standard-sdxl-hires.workflow.json
      - ../workflows/illustrious-booru.workflow.json
      - ../workflows/restyle-canny.workflow.json
      - ../workflows/mature-booru.workflow.json
      - ../workflows/mature-photoreal.workflow.json
      - ../workflows/mature-restyle.workflow.json
generatorOptions:
  disableNameSuffixHash: true
