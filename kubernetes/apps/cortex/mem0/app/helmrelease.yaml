# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mem0
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      mem0:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/mem0/openmemory-mcp
              tag: latest@sha256:b665d382a94fdc18c7bb84a647d4bebdc98d9e7fc1146fc5e559ca7f5f7f9211
            env:
              HOME: /tmp
              # LLM — route through LocalAI (OpenAI-compatible)
              OPENAI_BASE_URL: http://local-ai-intel.cortex.svc.cluster.local:8080/v1
              # SQLite database path
              DATABASE_URL: sqlite:////app/data/openmemory.db
              # Telemetry
              MEM0_TELEMETRY: "false"
            envFrom:
              - secretRef:
                  name: mem0-secret
            lifecycle:
              postStart:
                exec:
                  command:
                    - /bin/sh
                    - -c
                    - |
                      # Wait for the API to be ready, then push Qdrant/LocalAI config
                      for i in $(seq 1 30); do
                        if wget -q -O /dev/null http://localhost:8765/docs 2>/dev/null; then
                          wget -q -O- --post-data='{"openmemory":{"custom_instructions":""},"mem0":{"vector_store":{"provider":"qdrant","config":{"collection_name":"mem0","host":"qdrant.cortex.svc.cluster.local","port":6333,"embedding_model_dims":768}},"llm":{"provider":"openai","config":{"model":"mistral-7b-instruct","temperature":0.1,"max_tokens":2048,"openai_base_url":"http://local-ai-intel.cortex.svc.cluster.local:8080/v1","api_key":"not-needed"}},"embedder":{"provider":"openai","config":{"model":"nomic-embed-text","openai_base_url":"http://local-ai-intel.cortex.svc.cluster.local:8080/v1","api_key":"not-needed","embedding_dims":768}}}}' \
                            --header='Content-Type: application/json' \
                            'http://localhost:8765/api/v1/config/openmemory' > /dev/null 2>&1 && break
                        fi
                        sleep 2
                      done &
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: &port 8765
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /docs
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 15
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: mem0
        ports:
          http:
            port: 8765
    persistence:
      history:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 1Gi
        storageClass: ceph-block
        globalMounts:
          - path: /app/data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
