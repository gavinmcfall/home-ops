---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mem0-secret
    template:
      engineVersion: v2
      data:
        # OpenAI-compatible API key (required by SDK even if LocalAI ignores it)
        OPENAI_API_KEY: "{{ .MEM0_API_KEY }}"
        # Qdrant
        QDRANT_URL: http://qdrant.cortex.svc.cluster.local:6333
        QDRANT_API_KEY: "{{ .QDRANT_API_KEY }}"
  dataFrom:
    - extract:
        key: mem0
    - extract:
        key: qdrant
