# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mempalace-bridge
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      mempalace-bridge:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/mempalace-bridge
              tag: feat-pgvector-bridge@sha256:ca73ea111a84e89d03b6ead22ea3707a1e0192456361f7f3417b1fb6e32a5f04
            # Entrypoint (bridge/entrypoint.sh) builds the DSN from PGUSER/PGPASSWORD,
            # writes palace markers once, then runs supergateway -> patched serve.py.
            # MEMPALACE_BACKEND / PALACE_PATH / EMBEDDING_MODEL / HOME baked in image.
            env:
              # Cap onnxruntime/BLAS threads to the CPU budget. Without this the
              # embedder spawns ~1 thread per node core (20+) onto a 6-core cgroup
              # and thrashes; matching threads to the limit keeps mining efficient.
              OMP_NUM_THREADS: "6"
              OPENBLAS_NUM_THREADS: "6"
              # Per-file chunk admission cap. A mine loads the whole transcript
              # into memory + holds all chunks/entities, so a single huge session
              # (a 14MB debugging marathon re-saved across sessions) spiked >16Gi
              # and OOMKilled the daemon. Files over this cap are skipped (logged),
              # bounding any single mine to well under the limit. Normal sessions
              # are far below 3000 chunks; only pathological transcripts skip.
              MEMPALACE_MAX_CHUNKS_PER_FILE: "3000"
            envFrom:
              - secretRef:
                  name: mempalace-bridge-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 40
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket: { port: 8080 }
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 40
            resources:
              requests:
                cpu: 500m
                memory: 2Gi
              limits:
                # Mining embeds transcripts on CPU (onnxruntime). 2 cores made the
                # backlog drain glacially; 6 cores (matched by OMP_NUM_THREADS)
                # lets a mine finish in a sensible time.
                cpu: "6"
                # Idle is ~0.5Gi, but now that writes actually land, each mine
                # subprocess loads onnxruntime fresh (~2Gi) and big sessions
                # (700+ drawers) + onnxruntime arenas spike past 8Gi → OOMKilled
                # several times/day. Node has ~75Gi free, so give generous
                # headroom over the observed spikes. (Deeper fix: a persistent
                # embed worker / v3.5.0 daemon so the model loads once, not per mine.)
                memory: 16Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    service:
      app:
        controller: mempalace-bridge
        ports:
          http:
            port: 8080
    persistence:
      data:
        type: persistentVolumeClaim
        accessMode: ReadWriteOnce
        size: 2Gi
        storageClass: ceph-block
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
