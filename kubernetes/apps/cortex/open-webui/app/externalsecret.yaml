---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: open-webui
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: open-webui-secret
    template:
      engineVersion: v2
      data:
        # PostgreSQL
        DATABASE_URL: "postgresql://{{ .OPEN_WEBUI_POSTGRES_USER }}:{{ .OPEN_WEBUI_POSTGRES_PASSWORD }}@postgres18-cluster-rw.database.svc.cluster.local:5432/open_webui"
        INIT_POSTGRES_DBNAME: open_webui
        INIT_POSTGRES_HOST: postgres18-cluster-rw.database.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .OPEN_WEBUI_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .OPEN_WEBUI_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
        # OpenAI-compatible API (LocalAI)
        OPENAI_API_KEY: "{{ .OPENAI_API_KEY | default \"sk-not-needed\" }}"
        # Qdrant
        QDRANT_API_KEY: "{{ .QDRANT_API_KEY }}"
        # OIDC (Pocket-ID)
        OAUTH_CLIENT_ID: "{{ .OPEN_WEBUI_POCKETID_CLIENTID }}"
        OAUTH_CLIENT_SECRET: "{{ .OPEN_WEBUI_POCKETID_SECRET }}"
        OPENID_PROVIDER_URL: "{{ .OPEN_WEBUI_POCKETID_DISCOVERY }}"
        OAUTH_REDIRECT_URI: "{{ .OPEN_WEBUI_POCKETID_REDIRECT }}"
        # Session
        WEBUI_SECRET_KEY: "{{ .WEBUI_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: open-webui
    - extract:
        key: cloudnative-pg
    - extract:
        key: qdrant
