---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: openclaw-secret
    template:
      engineVersion: v2
      data:
        # Gateway
        OPENCLAW_GATEWAY_TOKEN: "{{ .OPENCLAW_GATEWAY_TOKEN }}"
        # Discord
        DISCORD_BOT_TOKEN: "{{ .DISCORD_BOT_TOKEN }}"
        DISCORD_SERVER_ID: "{{ .DISCORD_SERVER_ID }}"
        DISCORD_CHANNEL_ID: "{{ .DISCORD_CHANNEL_ID }}"
        # GitHub (optional - uncomment when ready)
        # GH_TOKEN: "{{ .GH_TOKEN }}"
  dataFrom:
    - extract:
        key: openclaw
---
# yaml-language-server: $schema=https://kubernetes-schemas.nerdz.cloud/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name openclaw-config
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        openclaw.json: |
          {
            "agents": {
              "defaults": {
                "model": {
                  "primary": "openai-codex/gpt-4o",
                  "fallbacks": [
                    "ollama/qwen2.5-coder:7b"
                  ]
                },
                "maxConcurrent": 4,
                "timeoutSeconds": 300
              },
              "list": [
                {
                  "id": "main",
                  "default": true,
                  "name": "C.O.R.T.E.X",
                  "workspace": "/home/node/.openclaw/workspace",
                  "agentDir": "/home/node/.openclaw/agents/main/agent"
                }
              ]
            },
            "models": {
              "providers": {
                "ollama": {
                  "baseUrl": "http://ollama.cortex.svc.cluster.local:11434/v1",
                  "apiKey": "ollama",
                  "api": "openai-completions",
                  "models": [
                    {
                      "id": "qwen2.5-coder:7b",
                      "name": "Qwen 2.5 Coder 7B (Local)",
                      "reasoning": false,
                      "input": ["text"],
                      "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                      "contextWindow": 32768,
                      "maxTokens": 8192
                    },
                    {
                      "id": "qwen2.5-coder:14b",
                      "name": "Qwen 2.5 Coder 14B (Local)",
                      "reasoning": false,
                      "input": ["text"],
                      "cost": { "input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0 },
                      "contextWindow": 32768,
                      "maxTokens": 8192
                    }
                  ]
                }
              }
            },
            "auth": {
              "profiles": {
                "openai-codex:default": {
                  "provider": "openai-codex",
                  "mode": "oauth"
                }
              }
            },
            "channels": {
              "discord": {
                "enabled": true,
                "actions": {
                  "messages": true,
                  "channels": true,
                  "search": true,
                  "reactions": false,
                  "stickers": false,
                  "polls": false,
                  "permissions": false,
                  "threads": true,
                  "pins": false,
                  "memberInfo": false,
                  "roleInfo": false,
                  "roles": false,
                  "channelInfo": false,
                  "voiceStatus": false,
                  "events": false,
                  "moderation": false,
                  "emojiUploads": false,
                  "stickerUploads": false
                },
                "blockStreaming": true,
                "groupPolicy": "allowlist",
                "dmPolicy": "pairing",
                "accounts": {
                  "default": {
                    "token": "{{ .DISCORD_BOT_TOKEN }}",
                    "guilds": {
                      "{{ .DISCORD_SERVER_ID }}": {
                        "channels": {
                          "{{ .DISCORD_CHANNEL_ID }}": { "allow": true, "requireMention": true }
                        }
                      }
                    }
                  }
                }
              }
            },
            "gateway": {
              "auth": { "mode": "token" },
              "controlUi": {},
              "mode": "local",
              "port": 18789
            },
            "messages": {
              "ackReactionScope": "group-mentions",
              "responsePrefix": "[{provider}/{model}]"
            }
          }
  dataFrom:
    - extract:
        key: openclaw
