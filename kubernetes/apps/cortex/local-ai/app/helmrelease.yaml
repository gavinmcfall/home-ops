# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# P2P Load Balancer — lightweight router that federates requests to workers
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai-lb
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      local-ai-lb:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v3.12.1@sha256:558efc7610e2ce43e702eaed4fcf456102a416471929d99819ef251fdbbf8b51
            args:
              - "federated"
            env:
              LOCALAI_CONFIG_DIR: /configuration
              LOCALAI_P2P_NETWORK_ID: cortex
            envFrom:
              - secretRef:
                  name: local-ai-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: &port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 15
                  periodSeconds: 15
            resources:
              requests:
                cpu: 100m
                memory: 250Mi
              limits:
                memory: 500Mi
    service:
      app:
        controller: local-ai-lb
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - local-ai.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# Intel iGPU Workers — run on MS-01 nodes (i9-12900H, UHD 770)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai-intel
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      local-ai-intel:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        rollingUpdate:
          surge: 0
          unavailable: 1
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v3.12.1-gpu-intel@sha256:8edc281c12c61662a05aac64e3d65986dafcc582947eddcd0c259163da5ce462
            args:
              - "run"
              - "--p2p"
              - "--federated"
              - "--enable-memory-reclaimer"
              - "--memory-reclaimer-threshold=0.8"
              - "--enable-watchdog-idle"
              - "--watchdog-idle-timeout=15m"
            securityContext:
              privileged: true
            env:
              LOCALAI_MODELS_PATH: /models
              LOCALAI_CONFIG_DIR: /configuration
              LOCALAI_P2P_NETWORK_ID: cortex
              DEBUG: "true"
            envFrom:
              - secretRef:
                  name: local-ai-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 120
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
            resources:
              requests:
                cpu: 800m
                memory: 16Gi
                gpu.intel.com/i915: "1"
              limits:
                memory: 64Gi
                gpu.intel.com/i915: "1"
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - local-ai-intel
                          - plex
    persistence:
      models:
        existingClaim: local-ai-models-intel
        globalMounts:
          - path: /models
      config:
        type: configMap
        name: local-ai-config-intel
        globalMounts:
          - path: /configuration
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# NVIDIA GPU Worker — runs on pyro-01 (GTX 1080 Ti, 2TB SSD for models)
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai-nvidia
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      local-ai-nvidia:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v3.12.1-gpu-nvidia-cuda-12@sha256:7067ca72d4c21af16d6b6aeba257ede289eaf3a82006c55a27887eeb711603c9
            args:
              - "run"
              - "--p2p"
              - "--federated"
              - "--enable-memory-reclaimer"
              - "--memory-reclaimer-threshold=0.8"
              - "--enable-watchdog-idle"
              - "--watchdog-idle-timeout=15m"
            env:
              LOCALAI_MODELS_PATH: /models
              LOCALAI_CONFIG_DIR: /configuration
              LOCALAI_P2P_NETWORK_ID: cortex
              NVIDIA_VISIBLE_DEVICES: all
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
              DEBUG: "true"
            envFrom:
              - secretRef:
                  name: local-ai-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 120
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 60
                  periodSeconds: 15
            resources:
              requests:
                cpu: 500m
                memory: 4Gi
                nvidia.com/gpu: 1
              limits:
                memory: 24Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoExecute
      nodeSelector:
        nvidia.com/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    persistence:
      models:
        existingClaim: local-ai-models-nvidia
        globalMounts:
          - path: /models
      config:
        type: configMap
        name: local-ai-config-nvidia
        globalMounts:
          - path: /configuration
