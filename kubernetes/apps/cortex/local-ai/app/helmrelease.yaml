# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
# Intel iGPU Workers — run on MS-01 nodes (i9-12900H, UHD 770)
# Models: mistral-7b-instruct, nomic-embed-text, whisper-1, tts-1
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai-intel
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      local-ai-intel:
        annotations:
          reloader.stakater.com/auto: "true"
        replicas: 2
        strategy: RollingUpdate
        rollingUpdate:
          surge: 0
          unavailable: 1
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v4.2.6-gpu-intel@sha256:176abeaec2e99fc14baec6620e91dc050ff97b891997000032421ebb13d98c18
            args:
              - "run"
              - "--enable-memory-reclaimer"
              - "--memory-reclaimer-threshold=0.8"
              - "--enable-watchdog-idle"
              - "--watchdog-idle-timeout=15m"
            securityContext:
              privileged: true
            env:
              LOCALAI_MODELS_PATH: /models
              LOCALAI_EXTERNAL_BACKENDS: "llama-cpp,whisper,piper"
              DEBUG: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: &port 8080
                  initialDelaySeconds: 300
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: *port
                  initialDelaySeconds: 120
                  periodSeconds: 15
            resources:
              requests:
                cpu: 800m
                memory: 512Mi
                gpu.intel.com/i915: "1"
              limits:
                memory: 8Gi
                gpu.intel.com/i915: "1"
        pod:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchExpressions:
                      - key: app.kubernetes.io/name
                        operator: In
                        values:
                          - local-ai-intel
                          - plex
    service:
      app:
        controller: local-ai-intel
        ports:
          http:
            port: 8080
    route:
      app:
        annotations:
          internal-dns.alpha.kubernetes.io/target: internal.${SECRET_DOMAIN}
        hostnames:
          - local-ai.${SECRET_DOMAIN}
        parentRefs:
          - name: internal
            namespace: network
            sectionName: https
    persistence:
      models:
        existingClaim: local-ai-models-intel
        globalMounts:
          - path: /models
      config:
        type: configMap
        name: local-ai-config-intel
        globalMounts:
          - path: /models/mistral-7b-instruct.yaml
            subPath: mistral-7b-instruct.yaml
          - path: /models/nomic-embed-text.yaml
            subPath: nomic-embed-text.yaml
          - path: /models/whisper-base.yaml
            subPath: whisper-base.yaml
          - path: /models/piper-tts.yaml
            subPath: piper-tts.yaml
      backends:
        type: emptyDir
        globalMounts:
          - path: /backends
      dri:
        type: hostPath
        hostPath: /dev/dri
        globalMounts:
          - path: /dev/dri
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
# NVIDIA GPU Worker — runs on pyro-01 (GTX 1080 Ti, 2TB SSD for models)
# Models: qwen2.5-coder:7b, qwen2.5-coder:14b
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-ai-nvidia
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    timeout: 15m
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    controllers:
      local-ai-nvidia:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/go-skynet/local-ai
              tag: v4.2.6-gpu-nvidia-cuda-12@sha256:9fd4c68ccd4997ed95c189403b57dac5b4e8087f54cd4300a0e89a9cd2f4ea5b
            args:
              - "run"
              - "--enable-memory-reclaimer"
              - "--memory-reclaimer-threshold=0.8"
              - "--enable-watchdog-idle"
              - "--watchdog-idle-timeout=15m"
            env:
              LOCALAI_MODELS_PATH: /models
              LOCALAI_EXTERNAL_BACKENDS: "llama-cpp"
              NVIDIA_VISIBLE_DEVICES: all
              NVIDIA_DRIVER_CAPABILITIES: compute,utility
              DEBUG: "false"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 300
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /readyz
                    port: 8080
                  initialDelaySeconds: 120
                  periodSeconds: 15
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
                nvidia.com/gpu: 1
              limits:
                memory: 8Gi
                nvidia.com/gpu: 1
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      runtimeClassName: nvidia
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoExecute
      nodeSelector:
        nvidia.com/gpu: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: local-ai-nvidia
        ports:
          http:
            port: 8080
    persistence:
      models:
        existingClaim: local-ai-models-nvidia
        globalMounts:
          - path: /models
      config:
        type: configMap
        name: local-ai-config-nvidia
        globalMounts:
          - path: /models/qwen2.5-coder-7b.yaml
            subPath: qwen2.5-coder-7b.yaml
          - path: /models/qwen2.5-coder-14b.yaml
            subPath: qwen2.5-coder-14b.yaml
      backends:
        type: emptyDir
        globalMounts:
          - path: /backends
      data:
        type: emptyDir
        globalMounts:
          - path: /data
