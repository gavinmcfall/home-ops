# =============================================================================
# DRAFT — "just deployments" sketch. NOT WIRED INTO FLUX. DO NOT DEPLOY AS-IS.
# =============================================================================
# Operator-free transplant of the Funcom stack (per snapetech/DuneAwakeningSelfHost
# compose.yaml). See ../SCOPING.md. Every value is a placeholder until:
#   - images are mirrored to a registry we control (Funcom registry is internal-only)
#   - the real compose.yaml env/ports are copied in
#   - public IP + UDP exposure are settled at first bring-up
# ${DUNE_REGISTRY} = our own registry (e.g. zot on ceph-bucket); ${DUNE_TAG} = <build>-0-shipping
# =============================================================================
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dune-awakening
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      # --- data plane ------------------------------------------------------
      postgres:
        type: statefulset
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/igw-postgres", tag: "17.4-alpine-fc-13" }
      rabbitmq-game:
        type: statefulset
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-rabbitmq", tag: "${DUNE_TAG}" }
            # TLS-AMQP on 31982 — needs cert-manager-issued cert (dependency).
      rabbitmq-admin:
        type: statefulset
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-rabbitmq", tag: "${DUNE_TAG}" }

      # --- one-shot DB init -----------------------------------------------
      db-utils:
        type: job
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-db-utils", tag: "${DUNE_TAG}" }

      # --- control plane (Funcom services, NO operators) ------------------
      director:
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-bg-director", tag: "${DUNE_TAG}" }
            envFrom: [{ secretRef: { name: dune-awakening-secret } }]   # FLS_SECRET / DUNE_JWT
      gateway:
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-gateway", tag: "${DUNE_TAG}" }
            envFrom: [{ secretRef: { name: dune-awakening-secret } }]
      text-router:
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server-text-router", tag: "${DUNE_TAG}" }

      # --- game server: ONE controller per map partition ------------------
      # operator-free: each map is a static Deployment. Start with Hagga Basin.
      game-hagga:
        containers:
          app:
            image: { repository: "${DUNE_REGISTRY}/funcom/self-hosting/seabass-server", tag: "${DUNE_TAG}" }
            # requires AVX2 (cluster ✅). -ExternalAddress + HOST_DATACENTER_IP_ADDRESS
            # MUST be the real public IPv4 (downward API / stable LB IP).
            env:
              HOST_DATACENTER_IP_ADDRESS: "PLACEHOLDER_PUBLIC_IPV4"
            envFrom: [{ secretRef: { name: dune-awakening-secret } }]
            resources:
              requests: { cpu: 2, memory: 12Gi }
              limits: { memory: 20Gi }   # Hagga Basin ~12-20Gi

    service:
      game-hagga:
        controller: game-hagga
        type: LoadBalancer          # Cilium L2, UDP — NOT the HTTP Gateway
        annotations:
          io.cilium/lb-ipam-pool: PLACEHOLDER   # confirm pool + spare IP
        ports:
          game:
            port: 27015             # Funcom default base; configurable via K8S_POOL_GAME_PORT_BASE
            protocol: UDP
      rabbitmq-game:
        controller: rabbitmq-game
        type: LoadBalancer
        ports:
          amqps:
            port: 31982
            protocol: TCP

    persistence:
      saved:
        existingClaim: dune-awakening-saved   # ceph-filesystem RWX, shared Saved/ across maps
        globalMounts:
          - path: /home/dune/server/DuneSandbox/Saved
      pgdata:
        accessMode: ReadWriteOnce
        size: 10Gi
        storageClass: ceph-block
        advancedMounts:
          postgres:
            app:
              - path: /var/lib/postgresql/data
