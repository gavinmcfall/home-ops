# =============================================================================
# DRAFT — NOT WIRED. Steam session + zot push creds for the headless image-sync.
# Populate 1Password item "steam-dune" AFTER the first interactive login (see
# RUNBOOK-image-pull.md for how to capture the session blob).
# =============================================================================
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: steam-dune
  namespace: games
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: steam-dune
    template:
      engineVersion: v2
      data:
        STEAM_USER: "{{ .STEAM_USER }}"
        ZOT_PASS: "{{ .ZOT_ADMIN_PASSWORD }}"
        # base64 of `tar -czf - -C ~/Steam config ssfn*` from the first login
        steam-session.tgz.b64: "{{ .STEAM_SESSION_TGZ_B64 }}"
  dataFrom:
    - extract:
        key: steam-dune
