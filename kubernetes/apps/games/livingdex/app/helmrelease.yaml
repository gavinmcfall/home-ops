# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: livingdex
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      # ---- API (Hono) -------------------------------------------------------
      api:
        # RollingUpdate is fine because the sprite PVC is ReadWriteMany (CephFS)
        # — a rolling update's brief two-pod overlap can share it. (Recreate is
        # avoided: app-template 4.4.0 emits an invalid rollingUpdate block with it.)
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          # Creates the `livingdex` role + database in the shared cluster before
          # the API starts (which then runs its own migrations on boot).
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 17.6.0@sha256:86a1992d46273c58fd4ad95b626081dfaabfe16bd56944675169e406d1a660dd
            envFrom: &envFrom
              - secretRef:
                  name: livingdex-secret
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/livingdex-api
              tag: 07616417a64f756b0a4cb2a82fce025e2beef80e
            env:
              PORT: "8080"
              SPRITE_DIR: /sprites # enables the offline sprite mirror
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 8080 }
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /readyz, port: 8080 }
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 8080 }
                  initialDelaySeconds: 3
                  periodSeconds: 3
                  timeoutSeconds: 5
                  failureThreshold: 30
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      # ---- Web (nginx static SPA + /api proxy) ------------------------------
      web:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        # Unprivileged nginx image: runs as its non-root user (uid 101) and
        # binds :8080, so no root / no writable-rootfs override is needed.
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            seccompProfile: { type: RuntimeDefault }
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/livingdex-web
              tag: 07616417a64f756b0a4cb2a82fce025e2beef80e
            env:
              API_UPSTREAM: livingdex-api.games.svc.cluster.local:8080
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 8080 }
                  initialDelaySeconds: 5
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: 8080 }
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }

      # ---- Seed (weekly catalogue refresh from PokéAPI) ---------------------
      seed:
        type: cronjob
        cronjob:
          schedule: "0 3 * * 1" # Monday 03:00 — picks up new species/forms/games
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/livingdex-api
              tag: 07616417a64f756b0a4cb2a82fce025e2beef80e
            command: ["node", "dist/seed/run.js"]
            env:
              SEED_TIER: full
              SEED_CACHE_DIR: /cache
              SEED_CONCURRENCY: "8"
            envFrom: *envFrom
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

      # ---- PokéAPI mirror (daily upstream-CSV sync into the `pokeapi` schema) --
      mirror:
        type: cronjob
        cronjob:
          schedule: "0 2 * * *" # daily 02:00 — no-ops unless the upstream CSVs changed
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/livingdex-api
              tag: 07616417a64f756b0a4cb2a82fce025e2beef80e
            command: ["node", "dist/mirror/run.js"]
            env:
              MIRROR_SCHEMA: pokeapi
            envFrom: *envFrom
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    service:
      api:
        controller: api
        ports:
          http:
            port: 8080
      web:
        controller: web
        ports:
          http:
            port: 8080

    persistence:
      # readOnlyRootFilesystem needs writable scratch; the seed also caches
      # PokéAPI responses here (ephemeral per run — no PVC for v1).
      tmp:
        type: emptyDir
        advancedMounts:
          api:
            app:
              - path: /tmp
          seed:
            app:
              - path: /tmp
          mirror:
            app:
              - path: /tmp
      cache:
        type: emptyDir
        advancedMounts:
          seed:
            app:
              - path: /cache
      # Offline sprite mirror target — populated on demand via the UI "Mirror"
      # button (POST /api/sprites/mirror). Re-fetchable, so no volsync backup.
      # ReadWriteMany (CephFS) so the api can roll without a volume hand-off stall.
      sprites:
        type: persistentVolumeClaim
        accessMode: ReadWriteMany
        size: 2Gi
        storageClass: ceph-filesystem
        advancedMounts:
          api:
            app:
              - path: /sprites
