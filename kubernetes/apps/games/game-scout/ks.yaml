---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app game-scout
  namespace: &namespace games
spec:
  targetNamespace: *namespace
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: cluster-apps-rook-ceph-cluster
      namespace: rook-ceph
  prune: true
  interval: 30m
  path: "./kubernetes/apps/games/game-scout/app"
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_CAPACITY: 2Gi
      VOLSYNC_MINUTE: "18"
      VOLSYNC_B2_MINUTE: "20"
      # The app runs as uid/gid 1000 (the image's "node" user), so the kopia mover
      # must too, or it can't read the /data snapshot.
      VOLSYNC_UID: "1000"
      VOLSYNC_GID: "1000"
      GATUS_SUBDOMAIN: deals
      GATUS_PATH: /healthz
      GATUS_STATUS: "200"
