---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-4.4.0/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app game-scout
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 4.4.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      game-scout:
        annotations:
          reloader.stakater.com/auto: "true"
        # SQLite is a single writer — never overlap two pods on the volume.
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/gavinmcfall/game-scout
              tag: 1.3.0
            env:
              PUBLIC_URL: https://deals.${SECRET_DOMAIN}
              DATA_DIR: /data
              PORT: &port 3000
              REGION: NZ
              CURRENCY: NZD
              SCHEDULE: "0 8 * * *"
              TZ: ${TIMEZONE}
            envFrom:
              - secretRef:
                  name: game-scout-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: *port }
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet: { path: /healthz, port: *port }
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: game-scout
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          external-dns.alpha.kubernetes.io/target: external.${SECRET_DOMAIN}
        hostnames:
          - "deals.${SECRET_DOMAIN}"
        parentRefs:
          - name: external
            namespace: network
            sectionName: https
    persistence:
      # PVC is created + backed up (TrueNAS + Backblaze) by the volsync-standard
      # component; the app just mounts it.
      data:
        existingClaim: game-scout
        globalMounts:
          - path: /data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
