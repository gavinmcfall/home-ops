---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: game-scout
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: game-scout-secret
    template:
      engineVersion: v2
      data:
        # Maps the GAME_SCOUT_* fields in the 1Password "game-scout" item to the
        # env-var names the container reads via envFrom.
        DISCORD_BOT_TOKEN: "{{ .GAME_SCOUT_DISCORD_BOT_TOKEN }}"
        DISCORD_CLIENT_ID: "{{ .GAME_SCOUT_DISCORD_CLIENT_ID }}"
        DISCORD_CLIENT_SECRET: "{{ .GAME_SCOUT_DISCORD_CLIENT_SECRET }}"
        OWNER_DISCORD_ID: "{{ .GAME_SCOUT_DISCORD_OWNER_ID }}"
        # Comma-separated Discord user IDs pre-approved for active access (owner +
        # friends). Anyone not listed can still log in but lands pending until you
        # approve them in the dashboard. Kept in 1Password so IDs aren't in git.
        DISCORD_ALLOWED_IDS: "{{ .GAME_SCOUT_DISCORD_ALLOWED_IDS }}"
        SESSION_SECRET: "{{ .GAME_SCOUT_SESSION_SECRET }}"
        ITAD_API_KEY: "{{ .GAME_SCOUT_ITAD_API_KEY }}"
  dataFrom:
    - extract:
        key: game-scout
