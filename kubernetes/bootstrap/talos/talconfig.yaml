# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.12.6
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.33.1

clusterName: "home-kubernetes"
endpoint: https://10.90.3.100:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "10.90.3.100"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "stanton-01"
    ipAddress: "10.90.3.101"
    installDiskSelector:
      serial: "S73VNU0X303066H"
    talosImageURL: factory.talos.dev/metal-installer/d009fe7b4f1bcd11a45d6ffd17e59921b0a33bc437eebb53cffb9a5b3b9e2992
    controlPlane: true
    networkInterfaces:
      - interface: bond0
        bond:
          mode: active-backup
          deviceSelectors:
            - hardwareAddr: "58:47:ca:76:16:d2"
              driver: igc
        dhcp: false
        addresses:
          - "10.90.3.101/16"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.90.254.1"
        mtu: 1500
        vip:
          ip: "10.90.3.100"
        # vlans:
        #   - &vlan107
        #     vlanId: 107
        #     mtu: 1500
        #     dhcp: false
        #     addresses:
        #       - "10.99.107.101/24"
        #     routes:
        #       - network: 0.0.0.0/0
        #         gateway: "10.99.107.1"
        #     dhcpOptions:
        #       routeMetric: 4096
      #############################################
      #         Thunerbolt Configuration          #
      #############################################
      - deviceSelector:
          busPath: 0-1.0 # stanton-02
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.101/32
        routes:
          - network: 169.254.255.102/32
            metric: 2048
      - deviceSelector:
          busPath: 1-1.0 # stanton-03
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.101/32
        routes:
          - network: 169.254.255.103/32
            metric: 2048
  ###################################################################
  ###################################################################
  - hostname: "stanton-02"
    ipAddress: "10.90.3.102"
    installDiskSelector:
      serial: "S73VNU0X303413H"
    talosImageURL: factory.talos.dev/metal-installer/d009fe7b4f1bcd11a45d6ffd17e59921b0a33bc437eebb53cffb9a5b3b9e2992
    controlPlane: true
    networkInterfaces:
      - interface: bond0
        bond:
          mode: active-backup
          deviceSelectors:
            - hardwareAddr: "58:47:ca:76:0b:fe"
              driver: igc
        dhcp: false
        addresses:
          - "10.90.3.102/16"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.90.254.1"
        mtu: 1500
        vip:
          ip: "10.90.3.100"
        # vlans:
        #   - &vlan107
        #     vlanId: 107
        #     mtu: 1500
        #     dhcp: false
        #     addresses:
        #       - "10.99.107.102/24"
        #     routes:
        #       - network: 0.0.0.0/0
        #         gateway: "10.99.107.1"
        #     dhcpOptions:
        #       routeMetric: 4096
      #############################################
      #         Thunerbolt Configuration          #
      #############################################
      - deviceSelector:
          busPath: 0-1.0 # stanton-01
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.102/32
        routes:
          - network: 169.254.255.101/32
            metric: 2048
      - deviceSelector:
          busPath: 1-1.0 # stanton-03
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.102/32
        routes:
          - network: 169.254.255.103/32
            metric: 2048
  ###################################################################
  ###################################################################
  - hostname: "stanton-03"
    ipAddress: "10.90.3.103"
    installDiskSelector:
      serial: "S73VNU0X303400H"
    talosImageURL: factory.talos.dev/metal-installer/d009fe7b4f1bcd11a45d6ffd17e59921b0a33bc437eebb53cffb9a5b3b9e2992
    controlPlane: true
    networkInterfaces:
      - interface: bond0
        bond:
          mode: active-backup
          deviceSelectors:
            - hardwareAddr: "58:47:ca:76:0e:de"
              driver: igc
        dhcp: false
        addresses:
          - "10.90.3.103/16"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.90.254.1"
        mtu: 1500
        vip:
          ip: "10.90.3.100"
        # vlans:
        #   - &vlan107
        #     vlanId: 107
        #     mtu: 1500
        #     dhcp: false
        #     addresses:
        #       - "10.99.107.103/24"
        #     routes:
        #       - network: 0.0.0.0/0
        #         gateway: "10.99.107.1"
        #     dhcpOptions:
        #       routeMetric: 4096
      #############################################
      #         Thunerbolt Configuration          #
      #############################################
      - deviceSelector:
          busPath: 0-1.0 # stanton-01
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.103/32
        routes:
          - network: 169.254.255.101/32
            metric: 2048
      - deviceSelector:
          busPath: 1-1.0 # stanton-02
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.103/32
        routes:
          - network: 169.254.255.102/32
            metric: 2048
  ###################################################################
  #                     WORKER NODES                               #
  ###################################################################
  - hostname: "pyro-01"
    ipAddress: "10.90.3.111"
    installDiskSelector:
      wwid: "naa.5002538e700ffde2"
    talosImageURL: factory.talos.dev/metal-installer/6d3b466016d617387863aec155bc5ed3b3a06c4d44391c47a8e5168f65da3681
    controlPlane: false
    nodeLabels:
      nvidia.com/gpu: "true"
      node-role.kubernetes.io/gpu: ""
    nodeTaints:
      nvidia.com/gpu: "true:NoExecute"
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "70:8b:cd:58:10:7e"
        dhcp: false
        addresses:
          - "10.90.3.111/16"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.90.254.1"
        mtu: 1500
    patches:
      # Mount 2TB SSD for model storage via OpenEBS
      - |-
        machine:
          disks:
            - device: /dev/disk/by-id/ata-Samsung_SSD_870_QVO_2TB_S5RPNF0T611875M
              partitions:
                - mountpoint: /var/openebs/local
      # NVIDIA kernel modules
      - |-
        machine:
          kernel:
            modules:
              - name: nvidia
              - name: nvidia_uvm
              - name: nvidia_drm
              - name: nvidia_modeset

# Global patches
patches:
  - "@./patches/global/containerd.yaml"
  - "@./patches/global/disable-search-domain.yaml"
  - "@./patches/global/hostdns.yaml"
  - "@./patches/global/local-dns.yaml"
  - "@./patches/global/kubelet.yaml"
  - "@./patches/global/openebs-local.yaml"
  - "@./patches/global/sysctl.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/api-access.yaml"
    - "@./patches/global/thunderbolt.yaml"
    - "@./patches/global/udev.yaml"
    - "@./patches/controller/cluster.yaml"
    - "@./patches/controller/disable-admission-controller.yaml"
    - "@./patches/controller/etcd.yaml"
    - "@./patches/controller/feature-gates.yaml"
