# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
# renovate: datasource=docker depName=ghcr.io/siderolabs/installer
talosVersion: v1.13.5
# renovate: datasource=docker depName=ghcr.io/siderolabs/kubelet
kubernetesVersion: v1.33.1

clusterName: "home-kubernetes"
endpoint: https://10.90.3.100:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"
additionalApiServerCertSans: &sans
  - "10.90.3.100"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "stanton-01"
    ipAddress: "10.90.3.101"
    installDiskSelector:
      serial: "S5XMNE0TC58615"   # PM9A3 960GB (was 990 PRO S73VNU0X303066H, pulled 2026-05-26 for RMA return)
    talosImageURL: factory.talos.dev/metal-installer/786a10aa2924e5caf00392a569de037cec138416143517e618d151b8176af7f3
    controlPlane: true
    networkInterfaces:
      - interface: bond0
        bond:
          mode: active-backup
          deviceSelectors:
            - hardwareAddr: "58:47:ca:76:16:d2"
              driver: igc
        dhcp: false
        addresses:
          - "10.90.3.101/16"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.90.254.1"
        mtu: 1500
        vip:
          ip: "10.90.3.100"
        # vlans:
        #   - &vlan107
        #     vlanId: 107
        #     mtu: 1500
        #     dhcp: false
        #     addresses:
        #       - "10.99.107.101/24"
        #     routes:
        #       - network: 0.0.0.0/0
        #         gateway: "10.99.107.1"
        #     dhcpOptions:
        #       routeMetric: 4096
      #############################################
      #          Ceph LACP bond (V2 fabric)       #
      #############################################
      - interface: bond1
        bond:
          mode: 802.3ad
          xmitHashPolicy: layer3+4
          lacpRate: fast
          miimon: 100
          deviceSelectors:
            - hardwareAddr: "58:47:ca:76:16:cf"
              driver: i40e
            - hardwareAddr: "58:47:ca:76:16:d0"
              driver: i40e
        dhcp: false
        mtu: 9000
        vlans:
          - vlanId: 100
            mtu: 9000
            dhcp: false
            addresses:
              - "10.99.100.101/24"
      #############################################
      #         Thunerbolt Configuration          #
      #############################################
      - deviceSelector:
          busPath: 0-1.0 # stanton-02
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.101/32
        routes:
          - network: 169.254.255.102/32
            metric: 2048
      - deviceSelector:
          busPath: 1-1.0 # stanton-03
        dhcp: false
        mtu: 65520
        addresses:
          - 169.254.255.101/32
        routes:
          - network: 169.254.255.103/32
            metric: 2048
